<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaceDrop &ndash; Your Run. Your Soundtrack. Perfectly Synced.</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --coral: #FF6B54;
      --coral-dark: #E85A44;
      --teal: #0FA68A;
      --teal-dark: #0D8E76;
      --navy: #1A2744;
      --navy-deep: #121D33;
      --amber: #FF8C42;
      --slate-600: #4B5E7A;
      --slate-400: #8494AD;
      --slate-200: #C8D1DC;
      --slate-100: #E8ECF1;
      --cloud: #F5F7FA;
      --green-500: #10b981;
      --green-600: #059669;
      --red-500: #ef4444;
      --red-600: #dc2626;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
      background: linear-gradient(135deg, var(--cloud) 0%, #E0E6EF 100%);
      color: var(--navy);
      line-height: 1.6;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* Header & Logo */
    header {
      text-align: center;
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid rgba(26, 39, 68, 0.1);
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--coral) 0%, var(--amber) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      color: white;
      box-shadow: 0 4px 12px rgba(255, 107, 84, 0.3);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, var(--coral), var(--amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }

    .tagline {
      color: var(--slate-600);
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    /* Spotify Connect Bar */
    .spotify-connect {
      background: white;
      border: 1px solid rgba(26, 39, 68, 0.1);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(26, 39, 68, 0.06);
    }

    .spotify-status {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--teal);
      animation: pulse 2s infinite;
    }

    .status-dot.disconnected {
      background: var(--slate-400);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .spotify-user {
      font-size: 0.9rem;
      color: var(--slate-600);
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--coral) 0%, var(--coral-dark) 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 107, 84, 0.3);
    }

    .btn-secondary {
      background: rgba(15, 166, 138, 0.08);
      color: var(--teal);
      border: 1px solid var(--teal);
    }

    .btn-secondary:hover {
      background: rgba(15, 166, 138, 0.15);
      transform: translateY(-2px);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.08);
      color: var(--red-500);
      border: 1px solid var(--red-500);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.15);
    }

    /* Section Styling */
    .section {
      background: white;
      border: 1px solid rgba(26, 39, 68, 0.08);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(26, 39, 68, 0.06);
    }

    .section-title {
      font-size: 1.4rem;
      margin-bottom: 20px;
      color: var(--navy);
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .section-icon {
      font-size: 1.6rem;
    }

    /* GPX Import */
    .gpx-import-container {
      margin-bottom: 30px;
    }

    .gpx-dropzone {
      border: 2px dashed rgba(15, 166, 138, 0.4);
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      background: rgba(15, 166, 138, 0.03);
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .gpx-dropzone:hover {
      border-color: var(--teal);
      background: rgba(15, 166, 138, 0.08);
    }

    .gpx-dropzone.dragover {
      border-color: var(--teal);
      background: rgba(15, 166, 138, 0.12);
    }

    .gpx-input {
      display: none;
    }

    .gpx-dropzone-text {
      color: var(--slate-600);
      margin-bottom: 8px;
    }

    .gpx-dropzone-file {
      font-size: 0.9rem;
      color: var(--teal);
      font-weight: 600;
    }

    .gpx-loaded {
      background: rgba(15, 166, 138, 0.08);
      border-color: var(--teal);
      color: var(--teal);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Trail Cards Grid */
    .trails-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .trail-card {
      background: var(--cloud);
      border: 1px solid rgba(26, 39, 68, 0.08);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .trail-card:hover {
      transform: translateY(-4px);
      border-color: var(--coral);
      background: white;
      box-shadow: 0 12px 24px rgba(255, 107, 84, 0.12);
    }

    .trail-card.selected {
      border-color: var(--coral);
      background: rgba(255, 107, 84, 0.06);
    }

    .flat-run-section {
      background: var(--cloud);
      border: 1px dashed rgba(15, 166, 138, 0.4);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    .flat-run-section.active {
      border-style: solid;
      border-color: var(--teal);
      background: rgba(15, 166, 138, 0.06);
    }

    .flat-run-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .flat-run-header h3 {
      font-size: 1.05rem;
      color: var(--teal);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .flat-run-toggle {
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .flat-run-toggle:hover {
      background: var(--teal-dark);
    }

    .flat-run-toggle.deselect {
      background: var(--slate-400);
    }

    .flat-run-controls {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .flat-run-distance-input {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .flat-run-distance-input label {
      color: var(--slate-600);
      font-size: 0.9rem;
    }

    .flat-run-distance-input input[type="number"] {
      width: 80px;
      background: white;
      border: 1px solid rgba(26, 39, 68, 0.15);
      border-radius: 8px;
      color: var(--navy);
      padding: 8px 12px;
      font-size: 1rem;
      text-align: center;
    }

    .flat-run-distance-input input[type="range"] {
      flex: 1;
      min-width: 120px;
    }

    .flat-run-distance-input span {
      color: var(--navy);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .flat-run-preview {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(15, 166, 138, 0.05);
      border-radius: 8px;
      display: flex;
      gap: 24px;
      font-size: 0.9rem;
      color: var(--slate-600);
    }

    .flat-run-preview strong {
      color: var(--navy);
    }

    .trail-card h3 {
      font-size: 1.1rem;
      margin-bottom: 6px;
      color: var(--navy);
    }

    .trail-location {
      font-size: 0.85rem;
      color: var(--slate-600);
      margin-bottom: 10px;
    }

    .trail-stats {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }

    .trail-stat {
      flex: 1;
    }

    .trail-stat-label {
      color: var(--slate-400);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .trail-stat-value {
      color: var(--navy);
      font-weight: 600;
    }

    .trail-sparkline {
      width: 100%;
      height: 30px;
      margin-top: 10px;
    }

    .difficulty-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 10px;
    }

    .difficulty-easy {
      background: rgba(15, 166, 138, 0.12);
      color: var(--teal);
    }

    .difficulty-medium {
      background: rgba(255, 140, 66, 0.12);
      color: var(--amber);
    }

    .difficulty-hard {
      background: rgba(255, 107, 84, 0.12);
      color: var(--coral);
    }

    /* Elevation Chart */
    .elevation-chart {
      width: 100%;
      margin: 20px 0;
      border-radius: 8px;
      background: var(--cloud);
      padding: 16px;
    }

    .chart-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      color: var(--slate-400);
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    /* Target Mode Tabs */
    .tabs-container {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(26, 39, 68, 0.1);
    }

    .tab-button {
      padding: 12px 16px;
      background: none;
      border: none;
      color: var(--slate-400);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab-button:hover {
      color: var(--coral);
    }

    .tab-button.active {
      color: var(--coral);
      border-bottom-color: var(--coral);
    }

    /* Input & Slider Styling */
    .control-group {
      margin-bottom: 20px;
    }

    .control-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--navy);
      font-size: 0.95rem;
    }

    .control-value {
      color: var(--coral);
      font-weight: 700;
      font-size: 1.1rem;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, var(--coral), var(--slate-400), var(--teal));
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--coral);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(255, 107, 84, 0.4);
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      width: 24px;
      height: 24px;
      box-shadow: 0 4px 12px rgba(255, 107, 84, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--coral);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(255, 107, 84, 0.4);
      transition: all 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      width: 24px;
      height: 24px;
      box-shadow: 0 4px 12px rgba(255, 107, 84, 0.6);
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--cloud);
      border: 1px solid rgba(26, 39, 68, 0.12);
      border-radius: 8px;
      color: var(--navy);
      font-size: 1rem;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: var(--coral);
      background: white;
      box-shadow: 0 0 0 3px rgba(255, 107, 84, 0.1);
    }

    /* Playlist Results */
    .playlist-results {
      margin-top: 20px;
    }

    .bpm-phases {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
      margin: 20px 0;
    }

    .bpm-phase {
      background: var(--cloud);
      border: 1px solid rgba(26, 39, 68, 0.08);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .bpm-phase-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--slate-400);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .bpm-phase-value {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--coral), var(--amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tracks-list {
      margin-top: 20px;
      display: grid;
      gap: 12px;
    }

    .track-item {
      background: var(--cloud);
      border: 1px solid rgba(26, 39, 68, 0.06);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .track-thumbnail {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--coral), var(--amber));
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 1.2rem;
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-name {
      font-weight: 600;
      color: var(--navy);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 0.85rem;
      color: var(--slate-600);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-bpm {
      background: rgba(255, 107, 84, 0.08);
      border: 1px solid var(--coral);
      color: var(--coral);
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .track-terrain {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--slate-400);
      flex-shrink: 0;
    }

    /* Loading & Messages */
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--slate-600);
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 107, 84, 0.2);
      border-top-color: var(--coral);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message {
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }

    .message-info {
      background: rgba(15, 166, 138, 0.08);
      border: 1px solid rgba(15, 166, 138, 0.2);
      color: var(--teal);
    }

    .message-success {
      background: rgba(15, 166, 138, 0.08);
      border: 1px solid rgba(15, 166, 138, 0.2);
      color: var(--teal);
    }

    .message-error {
      background: rgba(255, 107, 84, 0.08);
      border: 1px solid rgba(255, 107, 84, 0.2);
      color: var(--coral);
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid rgba(26, 39, 68, 0.1);
      color: var(--slate-400);
      font-size: 0.9rem;
    }

    /* Run Drop Card */
    .run-drop-card {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
      border-radius: 16px;
      padding: 24px;
      margin-top: 20px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .run-drop-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 107, 84, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .run-drop-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .run-drop-badge {
      background: linear-gradient(135deg, var(--coral), var(--amber));
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .run-drop-brand {
      font-size: 0.8rem;
      opacity: 0.6;
      font-weight: 600;
    }
    .run-drop-elev-svg {
      width: 100%;
      height: 100px;
      margin: 12px 0;
    }
    .run-drop-stats {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      font-size: 0.85rem;
    }
    .run-drop-stats span {
      opacity: 0.7;
    }
    .run-drop-stats strong {
      color: var(--coral);
    }
    .run-drop-track {
      margin-top: 16px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .run-drop-track-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--coral), var(--amber));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    .run-drop-track-name {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .run-drop-track-artist {
      font-size: 0.8rem;
      opacity: 0.6;
    }
    .run-drop-track-bpm {
      margin-left: auto;
      font-weight: 700;
      color: var(--amber);
      font-size: 0.9rem;
    }
    .share-btn {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--coral), var(--amber));
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .share-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 107, 84, 0.3);
    }

    /* Responsive */
    @media (max-width: 640px) {
      h1 {
        font-size: 1.8rem;
      }

      .trails-grid {
        grid-template-columns: 1fr;
      }

      .spotify-connect {
        flex-direction: column;
        align-items: flex-start;
      }

      .section {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React & Babel -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect, useMemo } = React;

    // ============ CONFIGURATION ============
    const SPOTIFY_CLIENT_ID = "5d10f2576ab846f08fab95b686a4d0da";
    const SPOTIFY_REDIRECT_URI = "https://benjaminhaycraft.github.io/pacesync/";
    const SPOTIFY_SCOPES = "playlist-modify-public playlist-modify-private user-read-private user-top-read";

    const FRENCH_TRAILS = [
      {
        id: "ecotrail-paris-20k",
        name: "EcoTrail de Paris 20K",
        location: "Parc de Saint-Cloud → Tour Eiffel",
        distance: 20,
        elevGain: 450,
        region: "&#206;le-de-France",
        difficulty: "Easy",
        profile: [100, 120, 145, 170, 160, 140, 120, 155, 175, 165, 140, 115, 95, 80, 60, 50, 45, 40, 38, 35],
      },
      {
        id: "occ-utmb",
        name: "OCC (UTMB Series) 56K",

    // ============ UTILITY FUNCTIONS ============
    function generateRandomString(length) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      let result = "";
      for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    async function sha256(plain) {
      const encoder = new TextEncoder();
      const data = encoder.encode(plain);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      return hashBuffer;
    }

    function base64encode(input) {
      return btoa(String.fromCharCode.apply(null, new Uint8Array(input)))
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=/g, "");
    }

    async function generateCodeChallenge(codeVerifier) {
      const hash = await sha256(codeVerifier);
      return base64encode(hash);
    }

    function gradientToBpm(gradient, baseBpm) {
      const uphillDrop = Math.max(0, gradient) * 250;
      const downhillBoost = Math.max(0, -gradient) * 200;
      const bpm = baseBpm - uphillDrop + downhillBoost;
      return Math.round(Math.max(95, Math.min(180, bpm)));
    }

    function paceToBaseBpm(minPerKm) {
      const bpm = 220 - minPerKm * 15;
      return Math.max(105, Math.min(175, bpm));
    }

    function calculateElevationGradient(elevProfile) {
      const segments = [];
      const segmentSize = Math.ceil(elevProfile.length / 20);
      for (let i = 0; i < elevProfile.length - 1; i += segmentSize) {
        const endIdx = Math.min(i + segmentSize, elevProfile.length - 1);
        const elevGain = elevProfile[endIdx] - elevProfile[i];
        const distance = (segmentSize / elevProfile.length) * 100;
        const gradient = distance > 0 ? elevGain / distance : 0;
        segments.push({ gradient, elevGain, startIdx: i, endIdx });
      }
      return segments;
    }

    function parseGPX(xmlString) {
      try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlString, "application/xml");
        if (doc.parseError) throw new Error("Invalid GPX file");

        const trkpts = doc.querySelectorAll("trkpt");
        const points = [];

        for (const pt of trkpts) {
          const lat = parseFloat(pt.getAttribute("lat"));
          const lon = parseFloat(pt.getAttribute("lon"));
          const eleNode = pt.querySelector("ele");
          const ele = eleNode ? parseFloat(eleNode.textContent) : 0;
          points.push({ lat, lon, ele });
        }

        const nameNode = doc.querySelector("trk > name") || doc.querySelector("metadata > name");
        const name = nameNode ? nameNode.textContent : "Custom GPX Trail";

        return { points, name };
      } catch (err) {
        throw new Error(`GPX parsing failed: ${err.message}`);
      }
    }

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const phi1 = (lat1 * Math.PI) / 180;
      const phi2 = (lat2 * Math.PI) / 180;
      const dPhi = ((lat2 - lat1) * Math.PI) / 180;
      const dLambda = ((lon2 - lon1) * Math.PI) / 180;
      const a =
        Math.sin(dPhi / 2) ** 2 +
        Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLambda / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function processGPXPoints(points) {
      if (!points || points.length < 2) {
        throw new Error("GPX file must have at least 2 points");
      }

      let totalDistance = 0;
      for (let i = 0; i < points.length - 1; i++) {
        totalDistance += haversineDistance(
          points[i].lat,
          points[i].lon,
          points[i + 1].lat,
          points[i + 1].lon
        );
      }
      totalDistance /= 1000;

      const elevProfile = points.map((p) => p.ele);
      let elevGain = 0;
      for (let i = 1; i < elevProfile.length; i++) {
        if (elevProfile[i] > elevProfile[i - 1]) {
          elevGain += elevProfile[i] - elevProfile[i - 1];
        }
      }

      const resampledProfile = [];
      const targetCount = 25;
      for (let i = 0; i < targetCount; i++) {
        const idx = Math.floor((i / (targetCount - 1)) * (elevProfile.length - 1));
        resampledProfile.push(Math.round(elevProfile[idx]));
      }

      return {
        distance: Math.round(totalDistance * 10) / 10,
        elevGain: Math.round(elevGain),
        profile: resampledProfile,
      };
    }

    // ============ SPOTIFY AUTH ============
    async function startSpotifyAuth() {
      const codeVerifier = generateRandomString(128);
      localStorage.setItem("spotifyCodeVerifier", codeVerifier);

      const codeChallenge = await generateCodeChallenge(codeVerifier);
      const params = new URLSearchParams({
        response_type: "code",
        client_id: SPOTIFY_CLIENT_ID,
        scope: SPOTIFY_SCOPES,
        redirect_uri: SPOTIFY_REDIRECT_URI,
        code_challenge_method: "S256",
        code_challenge: codeChallenge,
      });

      window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
    }

    async function exchangeCodeForToken(code) {
      const codeVerifier = localStorage.getItem("spotifyCodeVerifier");
      if (!codeVerifier) throw new Error("Code verifier not found");

      const params = new URLSearchParams({
        grant_type: "authorization_code",
        code: code,
        redirect_uri: SPOTIFY_REDIRECT_URI,
        client_id: SPOTIFY_CLIENT_ID,
        code_verifier: codeVerifier,
      });

      const response = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString(),
      });

      if (!response.ok) throw new Error("Token exchange failed");

      const data = await response.json();
      localStorage.setItem("spotifyAccessToken", data.access_token);
      localStorage.setItem("spotifyRefreshToken", data.refresh_token);
      localStorage.removeItem("spotifyCodeVerifier");

      return data.access_token;
    }

    async function refreshSpotifyToken(refreshToken) {
      const params = new URLSearchParams({
        grant_type: "refresh_token",
        refresh_token: refreshToken,
        client_id: SPOTIFY_CLIENT_ID,
      });

      const response = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString(),
      });

      if (!response.ok) throw new Error("Token refresh failed");

      const data = await response.json();
      localStorage.setItem("spotifyAccessToken", data.access_token);
      return data.access_token;
    }

    async function spotifyFetch(token, endpoint) {
      let currentToken = token;
      let response = await fetch(`https://api.spotify.com/v1${endpoint}`, {
        headers: { Authorization: `Bearer ${currentToken}` },
      });

      if (response.status === 401) {
        const refreshToken = localStorage.getItem("spotifyRefreshToken");
        if (refreshToken) {
          currentToken = await refreshSpotifyToken(refreshToken);
          response = await fetch(`https://api.spotify.com/v1${endpoint}`, {
            headers: { Authorization: `Bearer ${currentToken}` },
          });
        }
      }

      if (!response.ok) throw new Error(`Spotify API error: ${response.status}`);
      return response.json();
    }

        if (result.tracks && result.tracks.length > 0) return result;
      } catch (e) {

      // Fallback to search API
      const genre = genres.split(",")[0] || "pop";
      return searchTracksByQuery(token, targetBpm, limit, genre);

    // Fallback: search Spotify catalog by genre + BPM keywords
    async function searchTracksByQuery(token, targetBpm, limit = 3, genre = "pop") {
      const bpmRange = `${Math.max(80, targetBpm - 10)}-${Math.min(200, targetBpm + 10)}`;
      const queries = [
        `genre:${genre} year:2020-2026`,
        `genre:${genre}`,
        `${genre} workout running`,
      ];
      for (const q of queries) {
        try {
          const params = new URLSearchParams({
            q: q,
            type: "track",
            market: "US",
            limit: Math.min(limit * 3, 50),
          });
          const data = await spotifyFetch(token, `/search?${params.toString()}`);
          if (data.tracks && data.tracks.items && data.tracks.items.length > 0) {
            // Shuffle results for variety
            const shuffled = data.tracks.items.sort(() => Math.random() - 0.5);
            return { tracks: shuffled.slice(0, limit) };
          }
        } catch (e) {
          console.warn("Search fallback query failed:", q, e);
        }
      }
      return { tracks: [] };
    }
