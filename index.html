    }

    .status-dot {

      height: 12px;
      border-radius: 50%;
      background: var(--green-500);
      animation: pulse 2s infinite;
    }

    .status-dot.disconnected {
      background: var(--slate-600);
      animation: none;
    }

    @keyframes pulse {

    }

    .spotify-user {
      font-size: 0.9rem;
      color: var(--slate-400);
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--green-600) 0%, var(--green-500) 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(16, 185, 129, 0.3);
    }

    .btn-secondary {
      background: rgba(59, 130, 246, 0.1);
      color: var(--blue-500);
      border: 1px solid var(--blue-500);
    }

    .btn-secondary:hover {
      background: rgba(59, 130, 246, 0.2);
      transform: translateY(-2px);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      color: var(--red-500);
      border: 1px solid var(--red-500);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .section {

    .gpx-dropzone-file {

      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;

    .track-artist {

      white-space: nowrap;
      overflow: hidden;

      height: 40px;

      border-top-color: var(--blue-500);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;

      to { transform: rotate(360deg); }
    }

    .message {
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .message-info {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: var(--blue-500);

    .message-success {
      background: rgba(16, 185, 129, 0.1);

    .message-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--red-500);
    }

      text-align: center;
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid rgba(94, 109, 141, 0.3);
      color: var(--slate-500);

    /* Responsive */

      h1 {
        font-size: 1.8rem;
      }

        grid-template-columns: 1fr;
      }

      .spotify-connect {
        flex-direction: column;
        align-items: flex-start;
      }

      .section {
        padding: 20px;
      }
    }
  </style>

      { name: "Aggressive Climb", artist: "Hard Push", bpm: 144, uri: "spotify:track:mock24" },
      { name: "Sunset Trail", artist: "Golden Hour", bpm: 128, uri: "spotify:track:mock25" },
    ];

    // ============ UTILITY FUNCTIONS ============
    function generateRandomString(length) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      let result = "";
      for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    async function sha256(plain) {
      const encoder = new TextEncoder();
      const data = encoder.encode(plain);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      return hashBuffer;
    }

    function base64encode(input) {
      return btoa(String.fromCharCode.apply(null, new Uint8Array(input)))
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=/g, "");
    }

    async function generateCodeChallenge(codeVerifier) {
      const hash = await sha256(codeVerifier);
      return base64encode(hash);
    }

    function gradientToBpm(gradient, baseBpm) {
      const uphillDrop = Math.max(0, gradient) * 250;
      const downhillBoost = Math.max(0, -gradient) * 200;
      const bpm = baseBpm - uphillDrop + downhillBoost;
      return Math.round(Math.max(95, Math.min(180, bpm)));
    }

    function paceToBaseBpm(minPerKm) {
      const bpm = 220 - minPerKm * 15;
      return Math.max(105, Math.min(175, bpm));
    }

    function calculateElevationGradient(elevProfile) {
      const segments = [];
      const segmentSize = Math.ceil(elevProfile.length / 20);
      for (let i = 0; i < elevProfile.length - 1; i += segmentSize) {
        const endIdx = Math.min(i + segmentSize, elevProfile.length - 1);
        const elevGain = elevProfile[endIdx] - elevProfile[i];
        const distance = (segmentSize / elevProfile.length) * 100;
        const gradient = distance > 0 ? elevGain / distance : 0;
        segments.push({ gradient, elevGain, startIdx: i, endIdx });
      }
      return segments;
    }

    function parseGPX(xmlString) {
      try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlString, "application/xml");
        if (doc.parseError) throw new Error("Invalid GPX file");

        const trkpts = doc.querySelectorAll("trkpt");
        const points = [];

        for (const pt of trkpts) {
          const lat = parseFloat(pt.getAttribute("lat"));
          const lon = parseFloat(pt.getAttribute("lon"));
          const eleNode = pt.querySelector("ele");
          const ele = eleNode ? parseFloat(eleNode.textContent) : 0;
          points.push({ lat, lon, ele });
        }

        const nameNode = doc.querySelector("trk > name") || doc.querySelector("metadata > name");
        const name = nameNode ? nameNode.textContent : "Custom GPX Trail";

        return { points, name };
      } catch (err) {
        throw new Error(`GPX parsing failed: ${err.message}`);
      }
    }

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const phi1 = (lat1 * Math.PI) / 180;
      const phi2 = (lat2 * Math.PI) / 180;
      const dPhi = ((lat2 - lat1) * Math.PI) / 180;
      const dLambda = ((lon2 - lon1) * Math.PI) / 180;
      const a =
        Math.sin(dPhi / 2) ** 2 +
        Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLambda / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function processGPXPoints(points) {
      if (!points || points.length < 2) {
        throw new Error("GPX file must have at least 2 points");
      }

      let totalDistance = 0;
      for (let i = 0; i < points.length - 1; i++) {
        totalDistance += haversineDistance(
          points[i].lat,
          points[i].lon,
          points[i + 1].lat,
          points[i + 1].lon
        );
      }
      totalDistance /= 1000;

      const elevProfile = points.map((p) => p.ele);
      let elevGain = 0;
      for (let i = 1; i < elevProfile.length; i++) {
        if (elevProfile[i] > elevProfile[i - 1]) {
          elevGain += elevProfile[i] - elevProfile[i - 1];
        }
      }

      const resampledProfile = [];
      const targetCount = 25;
      for (let i = 0; i < targetCount; i++) {
        const idx = Math.floor((i / (targetCount - 1)) * (elevProfile.length - 1));
        resampledProfile.push(Math.round(elevProfile[idx]));
      }

      return {
        distance: Math.round(totalDistance * 10) / 10,
        elevGain: Math.round(elevGain),
        profile: resampledProfile,
      };
    }

    // ============ SPOTIFY AUTH ============
    async function startSpotifyAuth() {
      const codeVerifier = generateRandomString(128);
      localStorage.setItem("spotifyCodeVerifier", codeVerifier);

      const codeChallenge = await generateCodeChallenge(codeVerifier);
      const params = new URLSearchParams({
        response_type: "code",
        client_id: SPOTIFY_CLIENT_ID,
        scope: SPOTIFY_SCOPES,
        redirect_uri: SPOTIFY_REDIRECT_URI,
        code_challenge_method: "S256",
        code_challenge: codeChallenge,
      });

      window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
    }

    async function exchangeCodeForToken(code) {
      const codeVerifier = localStorage.getItem("spotifyCodeVerifier");
      if (!codeVerifier) throw new Error("Code verifier not found");

      const params = new URLSearchParams({
        grant_type: "authorization_code",
        code: code,
        redirect_uri: SPOTIFY_REDIRECT_URI,
        client_id: SPOTIFY_CLIENT_ID,
        code_verifier: codeVerifier,
      });

      const response = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString(),
      });

      if (!response.ok) throw new Error("Token exchange failed");

      const data = await response.json();
      localStorage.setItem("spotifyAccessToken", data.access_token);
      localStorage.setItem("spotifyRefreshToken", data.refresh_token);
      localStorage.removeItem("spotifyCodeVerifier");

      return data.access_token;
    }

    async function refreshSpotifyToken(refreshToken) {
      const params = new URLSearchParams({
        grant_type: "refresh_token",
        refresh_token: refreshToken,
        client_id: SPOTIFY_CLIENT_ID,
      });

      const response = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString(),
      });

      if (!response.ok) throw new Error("Token refresh failed");

      const data = await response.json();
      localStorage.setItem("spotifyAccessToken", data.access_token);
      return data.access_token;
    }

    async function spotifyFetch(token, endpoint) {
      let currentToken = token;
      let response = await fetch(`https://api.spotify.com/v1${endpoint}`, {
        headers: { Authorization: `Bearer ${currentToken}` },
      });

      if (response.status === 401) {
        const refreshToken = localStorage.getItem("spotifyRefreshToken");
        if (refreshToken) {
          currentToken = await refreshSpotifyToken(refreshToken);
          response = await fetch(`https://api.spotify.com/v1${endpoint}`, {
            headers: { Authorization: `Bearer ${currentToken}` },
          });
        }
      }

      if (!response.ok) throw new Error(`Spotify API error: ${response.status}`);
      return response.json();
    }

    async function getSpotifyUser(token) {
      return spotifyFetch(token, "/me");
    }

    async function searchTracksByBpm(token, targetBpm, limit = 20, genres = "electronic,rock,pop") {
      const params = new URLSearchParams({
        seed_genres: genres,
        target_tempo: targetBpm,
        min_tempo: Math.max(95, targetBpm - 15),
        max_tempo: Math.min(180, targetBpm + 15),
        min_energy: 0.5,
        market: "US",
        limit: limit,
      });

      return spotifyFetch(token, `/recommendations?${params.toString()}`);
    }

    async function getAudioFeatures(token, trackIds) {
      const params = new URLSearchParams({
        ids: trackIds.join(","),
      });

      return spotifyFetch(token, `/audio-features?${params.toString()}`);
    }

    async function createSpotifyPlaylist(token, userId, name, description, trackUris) {
      const playlistResp = await fetch(`https://api.spotify.com/v1/users/${userId}/playlists`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          name: name,
          description: description,
          public: false,
        }),
      });

      if (!playlistResp.ok) throw new Error("Failed to create playlist");
      const playlist = await playlistResp.json();

      const addTracksResp = await fetch(`https://api.spotify.com/v1/playlists/${playlist.id}/tracks`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ uris: trackUris }),
      });

      if (!addTracksResp.ok) throw new Error("Failed to add tracks to playlist");
      return playlist;
    }

    // ============ SPARKLINE SVG ============
    function ElevationSparkline({ profile, width = 240, height = 30 }) {
      if (!profile || profile.length < 2) return null;

      const minElev = Math.min(...profile);
      const maxElev = Math.max(...profile);
      const elevRange = maxElev - minElev || 1;

      const points = profile.map((elev, i) => {
        const x = (i / (profile.length - 1)) * width;
        const y = height - ((elev - minElev) / elevRange) * height;
        return [x, y];
      });

      const pathData = points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]} ${p[1]}`).join(" ");

      return (
        <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} className="trail-sparkline">
          <defs>
            <linearGradient id="sparklineFill" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor="rgba(59, 130, 246, 0.3)" />
              <stop offset="100%" stopColor="rgba(59, 130, 246, 0.05)" />
            </linearGradient>
          </defs>
          <path
            d={`${pathData} L${points[points.length - 1][0]} ${height} L0 ${height} Z`}
            fill="url(#sparklineFill)"
            stroke="url(#sparklineFill)"
            strokeWidth="1.5"
          />
          <path d={pathData} fill="none" stroke="rgba(59, 130, 246, 0.8)" strokeWidth="2" />
        </svg>
      );
    }

    // ============ ELEVATION CHART ============
    function ElevationChart({ profile, segments }) {
      if (!profile || profile.length < 2) return null;

      const width = 800;
      const height = 250;
      const padding = { top: 20, right: 20, bottom: 40, left: 40 };

      const minElev = Math.min(...profile);
      const maxElev = Math.max(...profile);
      const elevRange = maxElev - minElev || 1;

      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      const points = profile.map((elev, i) => {
        const x = padding.left + (i / (profile.length - 1)) * chartWidth;
        const y = padding.top + chartHeight - ((elev - minElev) / elevRange) * chartHeight;
        return [x, y];
      });

      const pathData = points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]} ${p[1]}`).join(" ");

      const terrainSegments = segments.map((seg, idx) => {
        const startX = padding.left + (seg.startIdx / (profile.length - 1)) * chartWidth;
        const endX = padding.left + (seg.endIdx / (profile.length - 1)) * chartWidth;
        const color =
          seg.gradient > 0.05
            ? "rgba(239, 68, 68, 0.15)"
            : seg.gradient < -0.05
              ? "rgba(16, 185, 129, 0.15)"
              : "rgba(148, 163, 184, 0.15)";

        return (
          <rect
            key={idx}
            x={startX}
            y={padding.top}
            width={endX - startX + 1}
            height={chartHeight}
            fill={color}
          />
        );
      });

      return (
        <div className="elevation-chart">
          <div className="chart-title">Elevation Profile & BPM Distribution</div>
          <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ width: "100%" }}>
            <defs>
              <linearGradient id="elevFill" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor="rgba(59, 130, 246, 0.2)" />
                <stop offset="100%" stopColor="rgba(59, 130, 246, 0.05)" />
              </linearGradient>
            </defs>
            {terrainSegments}
            <path
              d={`${pathData} L${points[points.length - 1][0]} ${padding.top + chartHeight} L${padding.left} ${padding.top + chartHeight} Z`}
              fill="url(#elevFill)"
            />
            <path d={pathData} fill="none" stroke="rgba(59, 130, 246, 0.8)" strokeWidth="2.5" />

            <line
              x1={padding.left}
              y1={padding.top + chartHeight}
              x2={width - padding.right}
              y2={padding.top + chartHeight}
              stroke="rgba(148, 163, 184, 0.3)"
              strokeWidth="1"
            />

            <text x="20" y="20" fill="var(--slate-400)" fontSize="12">
              {Math.round(maxElev)}m
            </text>
            <text x="20" y={padding.top + chartHeight + 10} fill="var(--slate-400)" fontSize="12">
              {Math.round(minElev)}m
            </text>

            <text
              x={padding.left + chartWidth / 2}
              y={height - 10}
              fill="var(--slate-400)"
              fontSize="12"
              textAnchor="middle"
            >
              Distance (proportional)
            </text>
          </svg>
        </div>
      );
    }

    // ============ MAIN APP ============
    function PaceSyncApp() {
      const [spotifyToken, setSpotifyToken] = useState(null);
      const [spotifyUser, setSpotifyUser] = useState(null);
      const [selectedTrail, setSelectedTrail] = useState(null);
      const [gpxTrail, setGpxTrail] = useState(null);
      const [targetMode, setTargetMode] = useState("pace");
      const [targetPace, setTargetPace] = useState(6);
      const [targetTime, setTargetTime] = useState(2);
      const [targetTimeHours, setTargetTimeHours] = useState(2);
      const [targetTimeMinutes, setTargetTimeMinutes] = useState(0);
      const [generatedPlaylist, setGeneratedPlaylist] = useState(null);
      const [loading, setLoading] = useState(false);
      const [message, setMessage] = useState(null);

      // Handle OAuth on mount
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");

        const token = localStorage.getItem("spotifyAccessToken");
        if (token) {
          setSpotifyToken(token);
          fetchSpotifyUser(token);
        } else if (code) {
          exchangeCodeForToken(code)
            .then((token) => {
              setSpotifyToken(token);
              fetchSpotifyUser(token);
              window.history.replaceState({}, document.title, window.location.pathname);
            })
            .catch((err) => {
              setMessage({ type: "error", text: `Auth error: ${err.message}` });
            });
        }
      }, []);

      const fetchSpotifyUser = async (token) => {
        try {
          const user = await getSpotifyUser(token);
          setSpotifyUser(user);
        } catch (err) {
          console.error("Failed to fetch user", err);
        }
      };

      const currentTrail = gpxTrail || selectedTrail;

      const trailElevProfile = currentTrail ? currentTrail.profile : [];
      const elevSegments = currentTrail ? calculateElevationGradient(trailElevProfile) : [];

      const trailDistance = currentTrail
        ? gpxTrail
          ? gpxTrail.distance
          : selectedTrail.distance
        : 0;

      const trailElevGain = currentTrail
        ? gpxTrail
          ? gpxTrail.elevGain
          : selectedTrail.elevGain
        : 0;

      let paceMin = targetPace;
      let estimatedTime = 0;

      if (targetMode === "pace" && trailDistance) {
        estimatedTime = trailDistance * paceMin;
      } else if (targetMode === "distance-time" && trailDistance && targetTime) {
        paceMin = targetTime / trailDistance;
      } else if (targetMode === "time" && trailDistance) {
        const hours = parseInt(targetTimeHours) || 0;
        const minutes = parseInt(targetTimeMinutes) || 0;
        const totalMinutes = hours * 60 + minutes;
        paceMin = totalMinutes / trailDistance;
      }

      const baseBpm = paceToBaseBpm(paceMin);

      const generatePlaylistTracks = async () => {
        if (!currentTrail) {
          setMessage({ type: "error", text: "Please select or import a trail" });
          return;
        }

        setLoading(true);
        try {
          const segments = elevSegments;
          const tracksBySegment = [];

          for (const seg of segments) {
            const bpm = gradientToBpm(seg.gradient, baseBpm);
            let segmentTracks = [];

            if (spotifyToken) {
              const genres = Math.random() > 0.5 ? "electronic" : "rock";
              try {
                const rec = await searchTracksByBpm(spotifyToken, bpm, 3, genres);
                const trackIds = rec.tracks.map((t) => t.id);
                const features = await getAudioFeatures(spotifyToken, trackIds);

                segmentTracks = rec.tracks.map((t, i) => ({
                  name: t.name,
                  artist: t.artists[0].name,
                  bpm: Math.round(features.audio_features[i].tempo),
                  uri: t.uri,
                }));
              } catch (err) {
                console.warn("Spotify API error, using mock tracks", err);
                segmentTracks = MOCK_TRACKS.filter((t) => Math.abs(t.bpm - bpm) <= 20).slice(0, 3);
              }
            } else {
              segmentTracks = MOCK_TRACKS.filter((t) => Math.abs(t.bpm - bpm) <= 20).slice(0, 3);
            }

            tracksBySegment.push({
              bpm,
              tracks: segmentTracks,
            });
          }

          const allTracks = tracksBySegment.flatMap((seg) => seg.tracks);
          const allTrackUris = allTracks.map((t) => t.uri);

          setGeneratedPlaylist({
            segments: tracksBySegment,
            tracks: allTracks,
            trackUris: allTrackUris,
            pace: paceMin.toFixed(1),
            time: estimatedTime.toFixed(0),
          });

          setMessage({ type: "success", text: "Playlist generated successfully!" });
        } catch (err) {
          setMessage({ type: "error", text: `Generation error: ${err.message}` });
        } finally {
          setLoading(false);
        }
      };

      const savePlaylistToSpotify = async () => {
        if (!generatedPlaylist || !spotifyToken || !spotifyUser) {
          setMessage({ type: "error", text: "Not connected to Spotify or no playlist generated" });
          return;
        }

        setLoading(true);
        try {
          const trailName = currentTrail?.name || "Custom Trail";
          const playlist = await createSpotifyPlaylist(
            spotifyToken,
            spotifyUser.id,
            `PaceSync: ${trailName} @ ${targetPace.toFixed(1)}/km`,
            `Generated with PaceSync for ${trailName} at ${paceMin.toFixed(1)} min/km pace`,
            generatedPlaylist.trackUris
          );

          setMessage({
            type: "success",
            text: `Playlist saved! ${playlist.name} - Check your Spotify library`,
          });
        } catch (err) {
          setMessage({ type: "error", text: `Save error: ${err.message}` });
        } finally {
          setLoading(false);
        }
      };

      const handleGpxUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const gpxData = parseGPX(evt.target?.result || "");
            const processed = processGPXPoints(gpxData.points);
            setGpxTrail({
              name: gpxData.name,
              distance: processed.distance,
              elevGain: processed.elevGain,
              profile: processed.profile,
            });
            setSelectedTrail(null);
            setMessage({ type: "success", text: `GPX loaded: ${gpxData.name}` });
          } catch (err) {
            setMessage({ type: "error", text: `GPX error: ${err.message}` });
          }
        };
        reader.readAsText(file);
      };

      return (
        <div className="container">
          <header>
            <div className="logo-container">
              <div className="logo-icon">â«</div>
              <h1>PaceSync</h1>
            </div>
            <p className="tagline">Music that matches your trail</p>
          </header>

          {/* Spotify Connect Bar */}
          <div className="spotify-connect">
            <div className="spotify-status">
              <div className={`status-dot ${spotifyToken ? "" : "disconnected"}`}></div>
              <div>
                {spotifyToken ? (
                  <div className="spotify-user">
                    Connected: {spotifyUser?.display_name || "Spotify User"}
                  </div>
                ) : (
                  <div className="spotify-user">Not connected to Spotify</div>
                )}
              </div>
            </div>
            {!spotifyToken ? (
              <button className="btn btn-primary" onClick={startSpotifyAuth}>
                Connect Spotify
              </button>
            ) : (
              <button
                className="btn btn-danger"
                onClick={() => {
                  localStorage.removeItem("spotifyAccessToken");
                  localStorage.removeItem("spotifyRefreshToken");
                  setSpotifyToken(null);
                  setSpotifyUser(null);
                }}
              >
                Disconnect
              </button>
            )}
          </div>

            <div className={`message message-${message.type}`}>

            </div>

                  reader.onload = (evt) => {
                    try {
                      const gpxData = parseGPX(evt.target?.result || "");
                      const processed = processGPXPoints(gpxData.points);
                      setGpxTrail({
                        name: gpxData.name,
                        distance: processed.distance,
                        elevGain: processed.elevGain,
                        profile: processed.profile,
                      });
                      setSelectedTrail(null);
                      setMessage({ type: "success", text: `GPX loaded: ${gpxData.name}` });

                  <div className="gpx-dropzone-text">Drop GPX file here or click to browse</div>
                  <div className="gpx-dropzone-text" style={{ fontSize: "0.8rem" }}>
                    Supported: .gpx
                  </div>
                </>
              )}
            </div>
            {gpxTrail && (
              <button
                className="btn btn-secondary"
                onClick={() => {
                  setGpxTrail(null);
                  setMessage({ type: "info", text: "GPX trail cleared" });
                }}
              >
                Clear GPX
              </button>
            )}
          </div>

          {/* Choose Trail */}
          <div className="section">
            <div className="section-title">
              <span className="section-icon">ðï¸</span>
              Choose a Trail {gpxTrail ? "(or use your GPX above)" : ""}
            </div>
            <div className="trails-grid">
              {FRENCH_TRAILS.map((trail) => (
                <div
                  key={trail.id}
                  className={`trail-card ${selectedTrail?.id === trail.id ? "selected" : ""}`}
                  onClick={() => {
                    setSelectedTrail(trail);
                    setGpxTrail(null);
                  }}
                >
                  <h3>{trail.name}</h3>
                  <p className="trail-location">{trail.location}</p>
                  <div className="trail-stats">
                    <div className="trail-stat">
                      <div className="trail-stat-label">Distance</div>
                      <div className="trail-stat-value">{trail.distance}km</div>
                    </div>
                    <div className="trail-stat">
                      <div className="trail-stat-label">Gain</div>
                      <div className="trail-stat-value">{trail.elevGain}m</div>
                    </div>
                  </div>
                  <ElevationSparkline profile={trail.profile} />
                  <span className={`difficulty-badge difficulty-${trail.difficulty.toLowerCase()}`}>
                    {trail.difficulty}
                  </span>
                </div>
              ))}
            </div>
          </div>

          {/* Elevation Chart & BPM */}
          {currentTrail && (
            <div className="section">
              <div className="section-title">
                <span className="section-icon">ð</span>
                {currentTrail.name}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px", marginBottom: "20px" }}>
                <div>
                  <div className="control-label">Total Distance</div>
                  <div className="control-value">{trailDistance.toFixed(1)}km</div>
                </div>
                <div>
                  <div className="control-label">Elevation Gain</div>
                  <div className="control-value">{trailElevGain}m</div>
                </div>
              </div>
              <ElevationChart profile={trailElevProfile} segments={elevSegments} />
            </div>
          )}

          {/* Set Your Target */}
          {currentTrail && (
            <div className="section">
              <div className="section-title">
                <span className="section-icon">â±ï¸</span>
                Set Your Target
              </div>

              <div className="tabs-container">
                <button
                  className={`tab-button ${targetMode === "pace" ? "active" : ""}`}
                  onClick={() => setTargetMode("pace")}
                >
                  Target Pace
                </button>
                <button
                  className={`tab-button ${targetMode === "distance-time" ? "active" : ""}`}
                  onClick={() => setTargetMode("distance-time")}
                >
                  Distance + Time
                </button>
                <button
                  className={`tab-button ${targetMode === "time" ? "active" : ""}`}
                  onClick={() => setTargetMode("time")}
                >
                  Target Time
                </button>
              </div>

              {targetMode === "pace" && (
                <div className="control-group">
                  <label className="control-label">
                    Target Pace: <span className="control-value">{targetPace.toFixed(2)} min/km</span>
                  </label>
                  <input
                    type="range"
                    min="3"
                    max="10"
                    step="0.1"
                    value={targetPace}
                    onChange={(e) => setTargetPace(parseFloat(e.target.value))}
                  />
                  <div style={{ marginTop: "12px", color: "var(--slate-400)", fontSize: "0.9rem" }}>
                    Estimated time: {(trailDistance * targetPace).toFixed(0)} min
                  </div>
                </div>
              )}

              {targetMode === "distance-time" && (
                <div className="control-group">
                  <label className="control-label">
                    Total Time: <span className="control-value">{targetTime.toFixed(1)} hours</span>
                  </label>
                  <input
                    type="range"
                    min="0.5"
                    max="12"
                    step="0.25"
                    value={targetTime}
                    onChange={(e) => setTargetTime(parseFloat(e.target.value))}
                  />
                  <div style={{ marginTop: "12px", color: "var(--slate-400)", fontSize: "0.9rem" }}>
                    Pace: {(targetTime / trailDistance).toFixed(2)} min/km
                  </div>
                </div>
              )}

              {targetMode === "time" && (
                <div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px", marginBottom: "20px" }}>
                    <div className="control-group">
                      <label className="control-label">
                        Hours: <span className="control-value">{targetTimeHours}</span>
                      </label>
                      <input
                        type="number"
                        min="0"
                        max="24"
                        value={targetTimeHours}
                        onChange={(e) => setTargetTimeHours(e.target.value)}
                      />
                    </div>
                    <div className="control-group">
                      <label className="control-label">
                        Minutes: <span className="control-value">{targetTimeMinutes}</span>
                      </label>
                      <input
                        type="number"
                        min="0"
                        max="59"
                        value={targetTimeMinutes}
                        onChange={(e) => setTargetTimeMinutes(e.target.value)}
                      />
                    </div>
                  </div>
                  <div style={{ color: "var(--slate-400)", fontSize: "0.9rem" }}>
                    Pace: {paceMin.toFixed(2)} min/km
                  </div>
                </div>
              )}

              <div style={{ marginTop: "20px", padding: "12px", background: "rgba(59, 130, 246, 0.1)", borderRadius: "8px" }}>
                <div className="control-label">Base BPM for Target Pace</div>
                <div className="control-value">{Math.round(baseBpm)} BPM</div>
              </div>
            </div>
          )}

          {/* Generate Button */}
          {currentTrail && (
            <button
              className="btn btn-primary"
              style={{ width: "100%", padding: "16px", fontSize: "1.1rem", marginBottom: "24px" }}
              onClick={generatePlaylistTracks}
              disabled={loading}
            >
              {loading ? "Generating..." : "Generate Playlist"}
            </button>
          )}

          {/* Playlist Results */}
          {generatedPlaylist && (
            <div className="section playlist-results">
              <div className="section-title">
                <span className="section-icon">ðµ</span>
                Your Generated Playlist
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px", marginBottom: "20px" }}>
                <div>
                  <div className="control-label">Pace</div>
                  <div className="control-value">{generatedPlaylist.pace} min/km</div>
                </div>
                <div>
                  <div className="control-label">Estimated Time</div>
                  <div className="control-value">{generatedPlaylist.time} minutes</div>
                </div>
              </div>

              <div className="control-label" style={{ marginBottom: "12px" }}>
                BPM by Terrain
              </div>
              <div className="bpm-phases">
                {generatedPlaylist.segments.map((seg, idx) => (
                  <div key={idx} className="bpm-phase">
                    <div className="bpm-phase-label">
                      {seg.gradient > 0.05 ? "â¬ï¸ Up" : seg.gradient < -0.05 ? "â¬ï¸ Down" : "â¡ï¸ Flat"}
                    </div>
                    <div className="bpm-phase-value">{seg.bpm}</div>
                  </div>
                ))}
              </div>

              <div className="control-label" style={{ marginTop: "20px", marginBottom: "12px" }}>
                Tracks ({generatedPlaylist.tracks.length})
              </div>
              <div className="tracks-list">
                {generatedPlaylist.tracks.map((track, idx) => (
                  <div key={idx} className="track-item">
                    <div className="track-thumbnail">{(idx % 5) + 1}</div>
                    <div className="track-info">
                      <div className="track-name">{track.name}</div>
                      <div className="track-artist">{track.artist}</div>
                    </div>
                    <div className="track-bpm">{track.bpm} BPM</div>
                  </div>
                ))}
              </div>

              {spotifyToken && (
                <button
                  className="btn btn-primary"
                  style={{ width: "100%", padding: "14px", marginTop: "20px", fontSize: "1rem" }}
                  onClick={savePlaylistToSpotify}
                  disabled={loading}
                >
                  {loading ? "Saving..." : "Save to Spotify"}
                </button>
              )}
            </div>
          )}

          {loading && !generatedPlaylist && (
            <div className="loading">
              <div className="spinner"></div>
              <div>Building your playlist...</div>
            </div>
          )}

          <footer>
            <p>
              PaceSync Â· Made for trail runners Â· Powered by Spotify
            </p>
          </footer>
        </div>
      );
    }

    // ============ ERROR BOUNDARY ============
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error("Error caught:", error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="container" style={{ paddingTop: "40px" }}>
              <div className="message message-error">
                <strong>Something went wrong:</strong> {this.state.error?.message}
              </div>
            </div>
          );
        }

        return this.props.children;
      }
    }

    // ============ RENDER ============
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(ErrorBoundary, null, React.createElement(PaceSyncApp)));
  </script>
</body>
</html>
