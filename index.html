            profile: Array(20).fill(50),
          }
        : null;

      const filteredTrails = React.useMemo(() => {
        let trails = TRAIL_DATABASE;

        // Text search
        if (trailSearch.trim()) {
          const q = trailSearch.toLowerCase();
          trails = trails.filter(t =>
            t.name.toLowerCase().includes(q) ||
            t.location.toLowerCase().includes(q) ||
            t.region.toLowerCase().includes(q) ||
            (t.country || "").toLowerCase().includes(q)
          );
        }

        // Type filter
        if (trailFilter === "road") trails = trails.filter(t => t.type === "road");
        else if (trailFilter === "trail") trails = trails.filter(t => t.type === "trail");
        else if (trailFilter === "upcoming") {
          const now = new Date();
          const threeMonths = new Date(now.getTime() + 90 * 24 * 60 * 60 * 1000);
          trails = trails.filter(t => {
            if (!t.date) return false;
            const d = new Date(t.date);
            return d >= now && d <= threeMonths;
          });
        }

        return trails;
      }, [trailSearch, trailFilter]);

      const currentTrail = flatRunTrail || gpxTrail || selectedTrail;

      const trailElevProfile = currentTrail ? currentTrail.profile : [];
      const elevSegments = currentTrail ? calculateElevationGradient(trailElevProfile) : [];

      const trailDistance = currentTrail ? currentTrail.distance : 0;

      const trailElevGain = currentTrail ? currentTrail.elevGain : 0;

      // Auto-set realistic default time when trail changes
      // ~5:00/km base pace, add ~30s/km per 100m elevation gain
      useEffect(() => {
        if (trailDistance > 0) {
          const elevFactor = trailElevGain > 0 ? (trailElevGain / 100) * 0.5 : 0;
          const realisticPace = 5.0 + elevFactor / trailDistance;
          const realisticMinutes = Math.round(trailDistance * realisticPace);
          const hrs = Math.floor(realisticMinutes / 60);
          const mins = realisticMinutes % 60;
          setTargetPace(Math.round(realisticPace * 10) / 10);
          setTargetTime(realisticMinutes / 60);
          setTargetTimeHours(hrs);
          setTargetTimeMinutes(mins);
        }
      }, [currentTrail?.id, trailDistance]);

      let paceMin = targetPace;
      let estimatedTime = 0;

      if (targetMode === "pace" && trailDistance) {
        estimatedTime = trailDistance * paceMin;
      } else if (targetMode === "distance-time" && trailDistance && targetTime) {
        paceMin = targetTime / trailDistance;
      } else if (targetMode === "time" && trailDistance) {
        const hours = parseInt(targetTimeHours) || 0;
        const minutes = parseInt(targetTimeMinutes) || 0;
        const totalMinutes = hours * 60 + minutes;
        paceMin = totalMinutes / trailDistance;
      }

      const baseBpm = paceToBaseBpm(paceMin);

      // ============ TRACK SCORING ALGORITHM ============
      // Scores a candidate track (0–100) using 4 signals:
      //   User Affinity (40), BPM Proximity (30), Popularity (20), Artist Variety (−10)
      function scoreTrack(track, targetBpm, seeds, usedArtistCounts) {
        // Signal 1: BPM Proximity (0–30 pts) — linear decay over ±30 BPM
        const bpmDiff = Math.abs((track.tempo || targetBpm) - targetBpm);
        const bpmScore = Math.max(0, 30 * (1 - bpmDiff / 30));

        // Signal 2: User Affinity (0–40 pts)
        let affinityScore = 0;
        if (seeds && seeds.topTracksFull) {
          const isTopTrack = seeds.topTracksFull.some((t) => t.id === track.id);
          if (isTopTrack) {
            affinityScore = 40; // Direct match — user actively listens to this track
          } else if (track.artists && track.artists.length > 0 && seeds.artistAffinityMap) {
            // Check if any of the track's artists appear in user's history
            const bestArtistAffinity = Math.max(
              0,
              ...track.artists.map((a) => seeds.artistAffinityMap.get(a.id) || 0)
            );
            if (bestArtistAffinity > 0) {
              affinityScore = 20 + (bestArtistAffinity / 100) * 20; // 20–40 scaled
            }
          }
        }

        // Signal 3: Worldwide Popularity (0–20 pts)
        const popularityScore = ((track.popularity || 0) / 100) * 20;

        // Signal 4: Artist Variety Penalty (0 to −10 pts)
        let varietyPenalty = 0;
        if (track.artists && track.artists.length > 0) {
          const primaryArtistId = track.artists[0].id;
          const count = usedArtistCounts.get(primaryArtistId) || 0;
          if (count >= 3) {
            varietyPenalty = 10; // Hard penalty — too many tracks from this artist
          } else if (count > 0) {
            varietyPenalty = 5 * count; // Soft penalty per appearance
          }
        }

        return Math.max(0, Math.min(100, bpmScore + affinityScore + popularityScore - varietyPenalty));
      }

      const generatePlaylistTracks = async () => {
        if (!currentTrail) {
          setMessage({ type: "error", text: "Please select or import a trail" });
          return;
        }

        setLoading(true);
        try {
          const segments = elevSegments;
          const tracksBySegment = [];

          // ── Dedup & variety state (reset each generation) ──
          const usedTrackIds = new Set();
          const usedArtistCounts = new Map();
          const OVER_FETCH = 10; // Fetch 10 candidates per segment, pick best 1

          const totalSegments = segments.length;
          for (let segIdx = 0; segIdx < segments.length; segIdx++) {
            const seg = segments[segIdx];
            // Progressive BPM: start ~12% slower, ramp up to ~5% faster by end
            const progress = totalSegments > 1 ? segIdx / (totalSegments - 1) : 1;
            const progressionFactor = 0.88 + 0.17 * Math.pow(progress, 1.3);
            const rawBpm = gradientToBpm(seg.gradient, baseBpm);
            const bpm = Math.round(Math.max(95, Math.min(185, rawBpm * progressionFactor)));
            let selectedTrack = null;

            if (spotifyToken) {
              try {
                // ── Fetch candidates (over-fetch for dedup headroom) ──
                let rec;
                if (musicMode === "random" && topSeeds) {
                  const shuffledTracks = [...topSeeds.trackIds].sort(() => Math.random() - 0.5);
                  rec = await searchTracksByBpmPersonalized(
                    spotifyToken, bpm, OVER_FETCH,
                    shuffledTracks.slice(0, 5),
                    [], topSeeds
                  );
                } else if (musicMode === "mood" && selectedMood) {
                  rec = await searchTracksByBpm(spotifyToken, bpm, OVER_FETCH, selectedMood);
                } else if (musicMode === "my-taste" && topSeeds) {
                  const shuffledTracks = [...topSeeds.trackIds].sort(() => Math.random() - 0.5);
                  const shuffledArtists = [...topSeeds.artistIds].sort(() => Math.random() - 0.5);
                  rec = await searchTracksByBpmPersonalized(
                    spotifyToken, bpm, OVER_FETCH,
                    shuffledTracks.slice(0, 3),
                    shuffledArtists.slice(0, 2), topSeeds
                  );
                } else {
                  const genres = ["electronic", "rock", "pop", "indie"];
                  const genre = genres[Math.floor(Math.random() * genres.length)];
                  rec = await searchTracksByBpm(spotifyToken, bpm, OVER_FETCH, genre);
                }

                // ── Score, deduplicate, and select best track ──
                if (rec.tracks && rec.tracks.length > 0) {
                  const candidates = rec.tracks
                    .filter((t) => t.id && !usedTrackIds.has(t.id)) // Remove duplicates
                    .map((t) => ({
                      ...t,
                      _score: scoreTrack(t, bpm, topSeeds, usedArtistCounts),
                    }))
                    .sort((a, b) => b._score - a._score); // Best first

                  if (candidates.length > 0) {
                    const best = candidates[0];
                    usedTrackIds.add(best.id);
                    const primaryArtistId = best.artists?.[0]?.id;
                    if (primaryArtistId) {
                      usedArtistCounts.set(primaryArtistId, (usedArtistCounts.get(primaryArtistId) || 0) + 1);
                    }
                    selectedTrack = {
                      name: best.name,
                      artist: best.artists?.[0]?.name || "Unknown Artist",
                      bpm: bpm,
                      uri: best.uri,
                      popularity: best.popularity || 0,
                      score: best._score,
                    };
                  }
                }
              } catch (err) {
                console.warn("Spotify API error for segment", segIdx, err);
              }
            }

            // ── Mock fallback (also deduped) ──
            if (!selectedTrack) {
              const mockCandidate = MOCK_TRACKS
                .filter((t) => Math.abs(t.bpm - bpm) <= 20 && !usedTrackIds.has(t.uri))
                .slice(0, 1)[0];
              if (mockCandidate) {
                usedTrackIds.add(mockCandidate.uri);
                selectedTrack = { ...mockCandidate, bpm, score: 0 };
              }
            }

            tracksBySegment.push({
              bpm,
              gradient: seg.gradient,
              tracks: selectedTrack ? [selectedTrack] : [],
            });
          }

          const allTracks = tracksBySegment.flatMap((seg) => seg.tracks);
          const allTrackUris = allTracks.map((t) => t.uri);

          setGeneratedPlaylist({
            segments: tracksBySegment,
            tracks: allTracks,
            trackUris: allTrackUris,
            pace: paceMin.toFixed(1),
            time: estimatedTime.toFixed(0),
          });

          const uniqueCount = new Set(allTrackUris).size;
          setMessage({ type: "success", text: `Playlist generated! ${uniqueCount} unique tracks matched to your trail.` });
        } catch (err) {
          setMessage({ type: "error", text: `Generation error: ${err.message}` });
        } finally {
          setLoading(false);
        }
      };

      const savePlaylistToSpotify = async () => {
        if (!generatedPlaylist || !spotifyToken || !spotifyUser) {
          setMessage({ type: "error", text: "Not connected to Spotify or no playlist generated" });
          return;
        }

        // Filter out mock track URIs (they start with spotify:track:mock)
        const realTrackUris = generatedPlaylist.trackUris.filter(
          (uri) => uri && !uri.includes(":mock")
        );

        if (realTrackUris.length === 0) {
          setMessage({ type: "error", text: "No real Spotify tracks found. Try regenerating or connect to Spotify first." });
          return;
        }

        setLoading(true);
        try {
          const trailName = currentTrail?.name || "Custom Trail";
          const playlist = await createSpotifyPlaylist(
            spotifyToken,
            spotifyUser.id,
            `PaceDrop: ${trailName} @ ${targetPace.toFixed(1)}/km`,
            `Generated with PaceDrop for ${trailName} at ${paceMin.toFixed(1)} min/km pace`,
            realTrackUris
          );

          setMessage({
            type: "success",
            text: `Playlist saved! ${playlist.name} (${realTrackUris.length} tracks) - Check your Spotify library`,
          });
        } catch (err) {
          setMessage({ type: "error", text: `Save error: ${err.message}` });
        } finally {
          setLoading(false);
        }
      };

      const handleGpxUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const gpxData = parseGPX(evt.target?.result || "");
            const processed = processGPXPoints(gpxData.points);
            setGpxTrail({
              name: gpxData.name,
              distance: processed.distance,
              elevGain: processed.elevGain,
              profile: processed.profile,
            });
            setSelectedTrail(null);
            setFlatRunActive(false);
            setMessage({ type: "success", text: `GPX loaded: ${gpxData.name}` });
          } catch (err) {
            setMessage({ type: "error", text: `GPX error: ${err.message}` });
          }
        };
        reader.readAsText(file);
      };

      return (
        <div className="container">
          <header>
            <div className="logo-container">
              <div className="logo-icon">&#9835;</div>
              <h1>PaceDrop</h1>
            </div>
            <p className="tagline">Your Run · Your Soundtrack · Perfectly Synced</p>
          </header>

          {/* Spotify Connect Bar */}
          <div className="spotify-connect">
            <div className="spotify-status">
              <div className={`status-dot ${spotifyToken ? "" : "disconnected"}`}></div>
              <div>
                {spotifyToken ? (
                  <div className="spotify-user">
                    Connected: {spotifyUser?.display_name || "Spotify User"}
                  </div>
                ) : (
                  <div className="spotify-user">Not connected to Spotify</div>
                )}
              </div>
            </div>
            {!spotifyToken ? (
              <button className="btn btn-primary" onClick={startSpotifyAuth}>
                Connect Spotify
              </button>
            ) : (
              <button
                className="btn btn-danger"
                onClick={() => {
                  localStorage.removeItem("spotifyAccessToken");
                  localStorage.removeItem("spotifyRefreshToken");
                  localStorage.removeItem("spotifyCodeVerifier");
                  setSpotifyToken(null);
                  setSpotifyUser(null);
                  setTopSeeds(null);
                  setGeneratedPlaylist(null);
                }}
              >
                Disconnect
              </button>
            )}
          </div>

          {/* Music Mode Selector */}
          {spotifyToken && (
            <div className="section" style={{ padding: "20px", marginBottom: "20px" }}>
              <div className="section-title" style={{ marginBottom: "16px" }}>
                <span className="section-icon">&#127925;</span>
                Music Style
              </div>

              {loadingTaste && (
                <div style={{ fontSize: "0.85rem", color: "var(--slate-600)", marginBottom: "12px" }}>
                  Loading your listening history...
                </div>
              )}

              {/* Mode Tabs */}
              <div style={{ display: "flex", gap: "8px", marginBottom: "16px", flexWrap: "wrap" }}>
                {[
                  { id: "my-taste", label: "My Taste", emoji: "&#10024;", desc: "Based on what you listen to" },
                  { id: "mood", label: "Mood", emoji: "&#127926;", desc: "Pick a genre" },
                  { id: "random", label: "Shuffle", emoji: "&#128256;", desc: "Random from your history" },
                  { id: "generic", label: "Explore", emoji: "&#127758;", desc: "Discover new tracks" },
                ].map((mode) => (
                  <button
                    key={mode.id}
                    onClick={() => setMusicMode(mode.id)}
                    disabled={mode.id !== "generic" && mode.id !== "mood" && !topSeeds}
                    style={{
                      flex: "1 1 auto",
                      minWidth: "100px",
                      padding: "10px 14px",
                      border: musicMode === mode.id
                        ? "1px solid var(--coral)"
                        : "1px solid rgba(26, 39, 68, 0.1)",
                      borderRadius: "10px",
                      background: musicMode === mode.id
                        ? "rgba(255, 107, 84, 0.08)"
                        : "var(--cloud)",
                      color: musicMode === mode.id ? "var(--navy)" : "var(--slate-600)",
                      cursor: "pointer",
                      textAlign: "center",
                      transition: "all 0.2s ease",
                      opacity: (mode.id !== "generic" && mode.id !== "mood" && !topSeeds) ? 0.35 : 1,
                      fontSize: "0.85rem",
                      fontWeight: musicMode === mode.id ? 600 : 400,
                    }}
                  >
                    <div style={{ fontSize: "1.2rem", marginBottom: "4px" }} dangerouslySetInnerHTML={{ __html: mode.emoji }} />
                    <div>{mode.label}</div>
                  </button>
                ))}
              </div>

              {/* My Taste details */}
              {musicMode === "my-taste" && topSeeds && (
                <div style={{ padding: "12px", background: "var(--cloud)", borderRadius: "8px" }}>
                  <div style={{ fontSize: "0.8rem", color: "var(--slate-600)", marginBottom: "8px" }}>
                    Recommendations seeded from your top artists: <span style={{ color: "var(--navy)", fontWeight: 600 }}>{topSeeds.artistNames.slice(0, 3).join(", ")}</span> & more
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                    {topSeeds.genres.slice(0, 8).map((genre, i) => (
                      <span key={i} style={{
                        padding: "3px 10px",
                        background: "rgba(15, 166, 138, 0.08)",
                        border: "1px solid rgba(15, 166, 138, 0.2)",
                        borderRadius: "20px",
                        fontSize: "0.72rem",
                        color: "var(--teal)",
                        textTransform: "capitalize"
                      }}>
                        {genre}
                      </span>
                    ))}
                  </div>
                </div>
              )}

              {/* Mood genre picker */}
              {musicMode === "mood" && (
                <div>
                  <div style={{ fontSize: "0.85rem", color: "var(--slate-600)", marginBottom: "10px" }}>
                    Pick a mood — {topSeeds ? "tracks will match your taste within this genre" : "we'll find tracks in this genre"}
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(110px, 1fr))", gap: "8px" }}>
                    {MOOD_GENRES.map((genre) => (
                      <button
                        key={genre.id}
                        onClick={() => setSelectedMood(genre.id)}
                        style={{
                          padding: "10px 8px",
                          border: selectedMood === genre.id
                            ? "1px solid var(--teal)"
                            : "1px solid rgba(26, 39, 68, 0.1)",
                          borderRadius: "10px",
                          background: selectedMood === genre.id
                            ? "rgba(15, 166, 138, 0.08)"
                            : "var(--cloud)",
                          color: selectedMood === genre.id ? "var(--navy)" : "var(--slate-600)",
                          cursor: "pointer",
                          textAlign: "center",
                          transition: "all 0.2s ease",
                          fontSize: "0.85rem",
                          fontWeight: selectedMood === genre.id ? 600 : 400,
                        }}
                      >
                        <div style={{ fontSize: "1.3rem", marginBottom: "4px" }}>{genre.emoji}</div>
                        <div>{genre.label}</div>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Random shuffle details */}
              {musicMode === "random" && topSeeds && (
                <div style={{ padding: "12px", background: "var(--cloud)", borderRadius: "8px" }}>
                  <div style={{ fontSize: "0.85rem", color: "var(--slate-600)" }}>
                    Each segment will pull random seeds from your <span style={{ color: "var(--navy)", fontWeight: 600 }}>{topSeeds.trackIds.length} top tracks</span> — expect a wild mix across all your genres!
                  </div>
                </div>
              )}

              {/* Generic details */}
              {musicMode === "generic" && (
                <div style={{ padding: "12px", background: "var(--cloud)", borderRadius: "8px" }}>
                  <div style={{ fontSize: "0.85rem", color: "var(--slate-600)" }}>
                    Discover trending tracks from popular genres (electronic, rock, pop, indie).
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Messages */}
          {message && (
            <div className={`message message-${message.type}`}>
              {message.text}
            </div>
          )}

          {/* GPX Import */}
          <div className="section gpx-import-container">
            <div className="section-title">
              <span className="section-icon">📁</span>
              Import Your Route (GPX)
            </div>
            <div
              className="gpx-dropzone"
              onDragOver={(e) => {
                e.preventDefault();
                e.currentTarget.classList.add("dragover");
              }}
              onDragLeave={(e) => {
                e.currentTarget.classList.remove("dragover");
              }}
              onDrop={(e) => {
                e.preventDefault();
                e.currentTarget.classList.remove("dragover");
                const file = e.dataTransfer.files?.[0];
                if (file) {
                  const reader = new FileReader();
                  reader.onload = (evt) => {
                    try {
                      const gpxData = parseGPX(evt.target?.result || "");
                      const processed = processGPXPoints(gpxData.points);
                      setGpxTrail({
                        name: gpxData.name,
                        distance: processed.distance,
                        elevGain: processed.elevGain,
                        profile: processed.profile,
                      });
                      setSelectedTrail(null);
                      setMessage({ type: "success", text: `GPX loaded: ${gpxData.name}` });
                    } catch (err) {
                      setMessage({ type: "error", text: `GPX error: ${err.message}` });
                    }
                  };
                  reader.readAsText(file);
                }
              }}
              onClick={() => {
                const input = document.createElement("input");
                input.type = "file";
                input.accept = ".gpx";
                input.onchange = (e) => {
                  const file = e.target.files?.[0];
                  if (file) {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                      try {
                        const gpxData = parseGPX(evt.target?.result || "");
                        const processed = processGPXPoints(gpxData.points);
                        setGpxTrail({
                          name: gpxData.name,
                          distance: processed.distance,
                          elevGain: processed.elevGain,
                          profile: processed.profile,
                        });
                        setSelectedTrail(null);
                        setMessage({
                          type: "success",
                          text: `GPX loaded: ${gpxData.name}`,
                        });
                      } catch (err) {
                        setMessage({
                          type: "error",
                          text: `GPX error: ${err.message}`,
                        });
                      }
                    };
                    reader.readAsText(file);
                  }
                };
                input.click();
              }}
            >
              {gpxTrail ? (
                <>
                  <div className="gpx-dropzone-file">✓ {gpxTrail.name}</div>
                  <div className="gpx-dropzone-text">
                    {gpxTrail.distance}km, {gpxTrail.elevGain}m gain
                  </div>
                </>
              ) : (
                <>
                  <div className="gpx-dropzone-text">Drop GPX file here or click to browse</div>
                  <div className="gpx-dropzone-text" style={{ fontSize: "0.8rem" }}>
                    Supported: .gpx
                  </div>
                </>
              )}
            </div>
            {gpxTrail && (
              <button
                className="btn btn-secondary"
                onClick={() => {
                  setGpxTrail(null);
                  setMessage({ type: "info", text: "GPX trail cleared" });
                }}
              >
                Clear GPX
              </button>
            )}
          </div>

          {/* Race Library */}
          <div className="section">
            <div className="section-title">
              <span className="section-icon">🏔️</span>
              Race Library {gpxTrail ? "(or use your GPX above)" : ""}
            </div>

            {/* Search Bar */}
            <div className="trail-search-bar">
              <div className="trail-search-wrapper">
                <span className="trail-search-icon">🔍</span>
                <input
                  type="text"
                  className="trail-search-input"
                  placeholder="Search races by name, location, or country..."
                  value={trailSearch}
                  onChange={(e) => setTrailSearch(e.target.value)}
                />
              </div>
            </div>

            {/* Filter Chips */}
            <div className="trail-filter-chips">
              {[
                { key: "all", label: "All", count: TRAIL_DATABASE.length },
                { key: "road", label: "Road", count: TRAIL_DATABASE.filter(t => t.type === "road").length },
                { key: "trail", label: "Trail", count: TRAIL_DATABASE.filter(t => t.type === "trail").length },
                { key: "upcoming", label: "Upcoming", count: (() => { const now = new Date(); const m3 = new Date(now.getTime() + 90*24*60*60*1000); return TRAIL_DATABASE.filter(t => t.date && new Date(t.date) >= now && new Date(t.date) <= m3).length; })() },
              ].map((f) => (
                <button
                  key={f.key}
                  className={`filter-chip ${trailFilter === f.key ? "active" : ""}`}
                  onClick={() => setTrailFilter(f.key)}
                >
                  {f.label} ({f.count})
                </button>
              ))}
            </div>

            {/* Trails Grid */}
            {filteredTrails.length > 0 ? (
              <div className="trails-grid">
                {filteredTrails.map((trail) => {
                  const now = new Date();
                  const threeMonths = new Date(now.getTime() + 90 * 24 * 60 * 60 * 1000);
                  const isUpcoming = trail.date && new Date(trail.date) >= now && new Date(trail.date) <= threeMonths;
                  const upcomingDate = isUpcoming ? new Date(trail.date).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : null;

                  return (
                    <div
                      key={trail.id}
                      className={`trail-card ${!flatRunActive && selectedTrail?.id === trail.id ? "selected" : ""}`}
                      onClick={() => {
                        setSelectedTrail(trail);
                        setGpxTrail(null);
                        setFlatRunActive(false);
                      }}
                    >
                      <div className="trail-card-badges">
                        {trail.type && <span className={`type-badge ${trail.type}`}>{trail.type}</span>}
                        {isUpcoming && <span className="upcoming-badge">{upcomingDate}</span>}
                      </div>
                      <h3>{trail.name}</h3>
                      <p className="trail-location">{trail.country && `${countryFlag(trail.country)} `}{trail.location}</p>
                      <div className="trail-stats">
                        <div className="trail-stat">
                          <div className="trail-stat-label">Distance</div>
                          <div className="trail-stat-value">{trail.distance}km</div>
                        </div>
                        <div className="trail-stat">
                          <div className="trail-stat-label">Gain</div>
                          <div className="trail-stat-value">{trail.elevGain}m</div>
                        </div>
                      </div>
                      <ElevationSparkline profile={trail.profile} />
                      <span className={`difficulty-badge difficulty-${trail.difficulty.toLowerCase()}`}>
                        {trail.difficulty}
                      </span>
                    </div>
                  );
                })}
              </div>
            ) : (
              <div className="no-results-message">
                No races found matching your search. Try different keywords or adjust your filters.
              </div>
            )}

            {/* Flat Run Option */}
            <div className={`flat-run-section ${flatRunActive ? "active" : ""}`}>
              <div
                className="flat-run-header"
                onClick={() => {
                  if (!flatRunActive) {
                    setFlatRunActive(true);
                    setSelectedTrail(null);
                    setGpxTrail(null);
                  } else {
                    setFlatRunActive(false);
                  }
                }}
              >
                <h3>🏃 Flat Run — no elevation, just pace</h3>
                <button className={`flat-run-toggle ${flatRunActive ? "deselect" : ""}`}>
                  {flatRunActive ? "Deselect" : "Select"}
                </button>
              </div>
              {flatRunActive && (
                <>
                  <div className="flat-run-controls">
                    <div className="flat-run-distance-input">
                      <label>Distance:</label>
                      <input
                        type="number"
                        min="1"
                        max="200"
                        value={flatRunDistance}
                        onChange={(e) => {
                          const v = Math.max(1, Math.min(200, parseInt(e.target.value) || 1));
                          setFlatRunDistance(v);
                        }}
                      />
                      <span>km</span>
                    </div>
                    <div className="flat-run-distance-input" style={{ flex: 1 }}>
                      <input
                        type="range"
                        min="1"
                        max="100"
                        value={Math.min(flatRunDistance, 100)}
                        onChange={(e) => setFlatRunDistance(parseInt(e.target.value))}
                        style={{ width: "100%" }}
                      />
                    </div>
                  </div>
                  <div className="flat-run-preview">
                    <div><strong>{flatRunDistance} km</strong> distance</div>
                    <div><strong>0 m</strong> elevation gain</div>
                    <div>Progressive BPM: warm up → push finish</div>
                  </div>
                </>
              )}
            </div>
          </div>

          {/* Elevation Chart & BPM */}
          {currentTrail && (
            <div className="section">
              <div className="section-title">
                <span className="section-icon">📊</span>
                {currentTrail.name}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px", marginBottom: "20px" }}>
                <div>
                  <div className="control-label">Total Distance</div>
                  <div className="control-value">{trailDistance.toFixed(1)}km</div>
                </div>
                <div>
                  <div className="control-label">Elevation Gain</div>
                  <div className="control-value">{trailElevGain}m</div>
                </div>
              </div>
              <ElevationChart profile={trailElevProfile} segments={elevSegments} />
            </div>
          )}

          {/* Set Your Target */}
          {currentTrail && (
            <div className="section">
              <div className="section-title">
                <span className="section-icon">⏱️</span>
                Set Your Target
              </div>

              <div className="tabs-container">
                <button
                  className={`tab-button ${targetMode === "pace" ? "active" : ""}`}
                  onClick={() => setTargetMode("pace")}
                >
                  Target Pace
                </button>
                <button
                  className={`tab-button ${targetMode === "distance-time" ? "active" : ""}`}
                  onClick={() => setTargetMode("distance-time")}
                >
                  Distance + Time
                </button>
                <button
                  className={`tab-button ${targetMode === "time" ? "active" : ""}`}
                  onClick={() => setTargetMode("time")}
                >
                  Target Time
                </button>
              </div>

              {targetMode === "pace" && (
                <div className="control-group">
                  <label className="control-label">
                    Target Pace: <span className="control-value">{targetPace.toFixed(2)} min/km</span>
                  </label>
                  <input
                    type="range"
                    min="3"
                    max="10"
                    step="0.1"
                    value={targetPace}
                    onChange={(e) => setTargetPace(parseFloat(e.target.value))}
                  />
                  <div style={{ marginTop: "12px", color: "var(--slate-400)", fontSize: "0.9rem" }}>
                    Estimated time: {(trailDistance * targetPace).toFixed(0)} min
                  </div>
                </div>
              )}

              {targetMode === "distance-time" && (
                <div className="control-group">
                  <label className="control-label">
                    Total Time: <span className="control-value">{targetTime.toFixed(1)} hours</span>
                  </label>
                  <input
                    type="range"
                    min="0.5"
                    max="12"
                    step="0.25"
                    value={targetTime}
                    onChange={(e) => setTargetTime(parseFloat(e.target.value))}
                  />
                  <div style={{ marginTop: "12px", color: "var(--slate-400)", fontSize: "0.9rem" }}>
                    Pace: {(targetTime / trailDistance).toFixed(2)} min/km
                  </div>
                </div>
              )}

              {targetMode === "time" && (
                <div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px", marginBottom: "20px" }}>
                    <div className="control-group">
                      <label className="control-label">
                        Hours: <span className="control-value">{targetTimeHours}</span>
                      </label>
                      <input
                        type="number"
                        min="0"
                        max="24"
                        value={targetTimeHours}
                        onChange={(e) => setTargetTimeHours(e.target.value)}
                      />
                    </div>
                    <div className="control-group">
                      <label className="control-label">
                        Minutes: <span className="control-value">{targetTimeMinutes}</span>
                      </label>
                      <input
                        type="number"
                        min="0"
                        max="59"
                        value={targetTimeMinutes}
                        onChange={(e) => setTargetTimeMinutes(e.target.value)}
                      />
                    </div>
                  </div>
                  <div style={{ color: "var(--slate-400)", fontSize: "0.9rem" }}>
                    Pace: {paceMin.toFixed(2)} min/km
                  </div>
                </div>
              )}

              <div style={{ marginTop: "20px", padding: "12px", background: "rgba(255, 107, 84, 0.06)", borderRadius: "8px" }}>
                <div className="control-label">Base BPM for Target Pace</div>
                <div className="control-value">{Math.round(baseBpm)} BPM</div>
              </div>
            </div>
          )}

          {/* Generate Button */}
          {currentTrail && (
            <button
              className="btn btn-primary"
              style={{ width: "100%", padding: "16px", fontSize: "1.1rem", marginBottom: "24px" }}
              onClick={generatePlaylistTracks}
              disabled={loading}
            >
              {loading ? "Generating..." : "Generate Playlist"}
            </button>
          )}

          {/* Playlist Results */}
          {generatedPlaylist && (
            <div className="section playlist-results">
              <div className="section-title">
                <span className="section-icon">🎵</span>
                Your Generated Playlist
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px", marginBottom: "20px" }}>
                <div>
                  <div className="control-label">Pace</div>
                  <div className="control-value">{generatedPlaylist.pace} min/km</div>
                </div>
                <div>
                  <div className="control-label">Estimated Time</div>
                  <div className="control-value">{generatedPlaylist.time} minutes</div>
                </div>
              </div>

              <div className="control-label" style={{ marginBottom: "12px" }}>
                BPM by Terrain
              </div>
              <div className="bpm-phases">
                {generatedPlaylist.segments.map((seg, idx) => (
                  <div key={idx} className="bpm-phase">
                    <div className="bpm-phase-label">
                      {seg.gradient > 0.05 ? "⬆️ Up" : seg.gradient < -0.05 ? "⬇️ Down" : "➡️ Flat"}
                    </div>
                    <div className="bpm-phase-value">{seg.bpm}</div>
                  </div>
                ))}
              </div>

              <div className="control-label" style={{ marginTop: "20px", marginBottom: "12px" }}>
                Tracks ({generatedPlaylist.tracks.length})
              </div>
              <div className="tracks-list">
                {generatedPlaylist.tracks.map((track, idx) => (
                  <div key={idx} className="track-item">
                    <div className="track-thumbnail">{(idx % 5) + 1}</div>
                    <div className="track-info">
                      <div className="track-name">{track.name}</div>
                      <div className="track-artist">{track.artist}</div>
                    </div>
                    <div className="track-bpm">{track.bpm} BPM</div>
                  </div>
                ))}
              </div>

              {/* Run Drop Card */}
              <RunDropCard playlist={generatedPlaylist} trail={currentTrail} baseBpm={baseBpm} />

              {spotifyToken && (
                <button
                  className="btn btn-primary"
                  style={{ width: "100%", padding: "14px", marginTop: "20px", fontSize: "1rem" }}
                  onClick={savePlaylistToSpotify}
                  disabled={loading}
                >
                  {loading ? "Saving..." : "Save to Spotify"}
                </button>
              )}
            </div>
          )}

          {loading && !generatedPlaylist && (
            <div className="loading">
              <div className="spinner"></div>
              <div>Building your playlist...</div>
            </div>
          )}

          <footer>
            <p>
              PaceDrop · Your run, your soundtrack · Powered by Spotify
            </p>
          </footer>
        </div>
      );
    }

    // ============ ERROR BOUNDARY ============
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error("Error caught:", error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="container" style={{ paddingTop: "40px" }}>
              <div className="message message-error">
                <strong>Something went wrong:</strong> {this.state.error?.message}
              </div>
            </div>
          );
        }

        return this.props.children;
      }
    }

    // ============ RENDER ============
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(ErrorBoundary, null, React.createElement(PaceDropApp)));
  </script>
</body>
</html>
