    async function createSpotifyPlaylist(token, userId, name, description, trackUris) {
      let currentToken = token;

      // First attempt
      let playlistResp = await fetch(`https://api.spotify.com/v1/users/${userId}/playlists`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${currentToken}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          name: name,
          description: description,
          public: false,
        }),
      });

      // If 401, try refreshing the token
      if (playlistResp.status === 401) {
        const refreshToken = localStorage.getItem("spotifyRefreshToken");
        if (refreshToken) {
          currentToken = await refreshSpotifyToken(refreshToken);
          playlistResp = await fetch(`https://api.spotify.com/v1/users/${userId}/playlists`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${currentToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              name: name,
              description: description,
              public: false,
            }),
          });
        }
      }

      if (!playlistResp.ok) {
        const errData = await playlistResp.json().catch(() => ({}));
        const errMsg = errData?.error?.message || playlistResp.statusText || "Unknown error";
        if (playlistResp.status === 403) {
          throw new Error(`Spotify denied access (403). Try disconnecting and reconnecting Spotify — click the Disconnect button, then Connect again.`);
        }
        throw new Error(`Playlist creation failed (${playlistResp.status}): ${errMsg}`);
      }
      const playlist = await playlistResp.json();

      // Add tracks (filter out any invalid URIs)
      const validUris = trackUris.filter(uri => uri && uri.startsWith("spotify:track:") && !uri.includes(":mock"));
      if (validUris.length === 0) {
        throw new Error("No valid Spotify tracks to add. Try regenerating the playlist.");
      }

      const addTracksResp = await fetch(`https://api.spotify.com/v1/playlists/${playlist.id}/tracks`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${currentToken}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ uris: validUris }),
      });

      if (!addTracksResp.ok) {
        const errData = await addTracksResp.json().catch(() => ({}));
        throw new Error(`Failed to add tracks: ${errData?.error?.message || addTracksResp.statusText}`);
      }
      return playlist;
    }

    // ============ SPARKLINE SVG ============
    function ElevationSparkline({ profile, width = 240, height = 30 }) {
      if (!profile || profile.length < 2) return null;

      const minElev = Math.min(...profile);
      const maxElev = Math.max(...profile);
      const elevRange = maxElev - minElev || 1;

      const points = profile.map((elev, i) => {
        const x = (i / (profile.length - 1)) * width;
        const y = height - ((elev - minElev) / elevRange) * height;
        return [x, y];
      });

      const pathData = points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]} ${p[1]}`).join(" ");

      return (
        <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} className="trail-sparkline">
          <defs>
            <linearGradient id="sparklineFill" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor="rgba(15, 166, 138, 0.25)" />
              <stop offset="100%" stopColor="rgba(255, 107, 84, 0.08)" />
            </linearGradient>
          </defs>
          <path
            d={`${pathData} L${points[points.length - 1][0]} ${height} L0 ${height} Z`}
            fill="url(#sparklineFill)"
            stroke="url(#sparklineFill)"
            strokeWidth="1.5"
          />
          <path d={pathData} fill="none" stroke="rgba(15, 166, 138, 0.7)" strokeWidth="2" />
        </svg>
      );
    }

    // ============ ELEVATION CHART ============
    function ElevationChart({ profile, segments }) {
      if (!profile || profile.length < 2) return null;

      const width = 800;
      const height = 250;
      const padding = { top: 20, right: 20, bottom: 40, left: 40 };

      const minElev = Math.min(...profile);
      const maxElev = Math.max(...profile);
      const elevRange = maxElev - minElev || 1;

      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      const points = profile.map((elev, i) => {
        const x = padding.left + (i / (profile.length - 1)) * chartWidth;
        const y = padding.top + chartHeight - ((elev - minElev) / elevRange) * chartHeight;
        return [x, y];
      });

      const pathData = points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]} ${p[1]}`).join(" ");

      const terrainSegments = segments.map((seg, idx) => {
        const startX = padding.left + (seg.startIdx / (profile.length - 1)) * chartWidth;
        const endX = padding.left + (seg.endIdx / (profile.length - 1)) * chartWidth;
        const color =
          seg.gradient > 0.05
            ? "rgba(255, 107, 84, 0.12)"
            : seg.gradient < -0.05
              ? "rgba(15, 166, 138, 0.12)"
              : "rgba(75, 94, 122, 0.08)";

        return (
          <rect
            key={idx}
            x={startX}
            y={padding.top}
            width={endX - startX + 1}
            height={chartHeight}
            fill={color}
          />
        );
      });

      return (
        <div className="elevation-chart">
          <div className="chart-title">Elevation Profile & BPM Distribution</div>
          <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ width: "100%" }}>
            <defs>
              <linearGradient id="elevFill" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor="rgba(15, 166, 138, 0.2)" />
                <stop offset="100%" stopColor="rgba(255, 107, 84, 0.05)" />
              </linearGradient>
            </defs>
            {terrainSegments}
            <path
              d={`${pathData} L${points[points.length - 1][0]} ${padding.top + chartHeight} L${padding.left} ${padding.top + chartHeight} Z`}
              fill="url(#elevFill)"
            />
            <path d={pathData} fill="none" stroke="rgba(15, 166, 138, 0.7)" strokeWidth="2.5" />

            <line
              x1={padding.left}
              y1={padding.top + chartHeight}
              x2={width - padding.right}
              y2={padding.top + chartHeight}
              stroke="rgba(148, 163, 184, 0.3)"
              strokeWidth="1"
            />

            <text x="20" y="20" fill="var(--slate-400)" fontSize="12">
              {Math.round(maxElev)}m
            </text>
            <text x="20" y={padding.top + chartHeight + 10} fill="var(--slate-400)" fontSize="12">
              {Math.round(minElev)}m
            </text>

            <text
              x={padding.left + chartWidth / 2}
              y={height - 10}
              fill="var(--slate-400)"
              fontSize="12"
              textAnchor="middle"
            >
              Distance (proportional)
            </text>
          </svg>
        </div>
      );
    }

    // ============ MAIN APP ============
    // ============ RUN DROP CARD ============
    function RunDropCard({ playlist, trail, baseBpm }) {
      if (!playlist || !trail || !playlist.segments || playlist.segments.length === 0) return null;

      const profile = trail.profile || [];
      const isFlat = !profile.length || profile.every((v) => Math.abs(v - profile[0]) < 5);

      // For trails with elevation: find the steepest descent
      let maxDrop = 0;
      let dropIdx = 0;
      for (let i = 1; i < profile.length; i++) {
        const drop = profile[i - 1] - profile[i];
        if (drop > maxDrop) {
          maxDrop = drop;
          dropIdx = i;
        }
      }

      // For flat runs: find the highest BPM segment (peak energy moment)
      let peakSegIdx = 0;
      let peakBpm = 0;
      playlist.segments.forEach((seg, idx) => {
        if (seg.bpm > peakBpm) {
          peakBpm = seg.bpm;
          peakSegIdx = idx;
        }
      });

      // Choose which moment to feature
      const hasDrop = maxDrop >= 5;
      const featuredSegIdx = hasDrop
        ? Math.min(Math.floor((dropIdx / Math.max(profile.length, 1)) * playlist.segments.length), playlist.segments.length - 1)
        : peakSegIdx;
      const featuredSegment = playlist.segments[featuredSegIdx];
      const featuredTrack = featuredSegment?.tracks?.[0];
      const featuredBpm = featuredSegment?.bpm || baseBpm;

      // Card labels
      const badgeText = hasDrop ? "The Drop" : "Peak Energy";
      const stat1Label = hasDrop ? "Drop" : "Distance";
      const stat1Value = hasDrop ? `${Math.round(maxDrop)}m` : `${trail.distance || 0}K`;
      const stat3Label = hasDrop ? "Elevation" : "Segments";
      const stat3Value = hasDrop ? `${Math.round(Math.max(...profile))}m` : `${playlist.segments.length}`;

      // SVG chart
      const width = 400;
      const height = 80;

      // For flat runs, generate a BPM waveform instead of elevation
      let pts, pathD, markerX, markerY;
      if (hasDrop && profile.length >= 2) {
        const minElev = Math.min(...profile);
        const maxElev = Math.max(...profile);
        const elevRange = maxElev - minElev || 1;
        pts = profile.map((e, i) => [
          (i / (profile.length - 1)) * width,
          height - ((e - minElev) / elevRange) * height * 0.85 - 5,
        ]);
        markerX = (dropIdx / (profile.length - 1)) * width;
        markerY = pts[dropIdx][1];
      } else {
        // BPM waveform for flat runs
        const bpms = playlist.segments.map((s) => s.bpm);
        const minBpm = Math.min(...bpms);
        const maxBpmVal = Math.max(...bpms);
        const bpmRange = maxBpmVal - minBpm || 1;
        pts = bpms.map((b, i) => [
          (i / Math.max(bpms.length - 1, 1)) * width,
          height - ((b - minBpm) / bpmRange) * height * 0.75 - 5,
        ]);
        markerX = (peakSegIdx / Math.max(bpms.length - 1, 1)) * width;
        markerY = pts[peakSegIdx] ? pts[peakSegIdx][1] : height / 2;
      }
      pathD = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");

      const handleShare = async () => {
        const shareText = hasDrop
          ? `${trail.name} — ${featuredBpm} BPM at the drop!`
          : `${trail.name} — Peak energy at ${featuredBpm} BPM!`;
        const shareData = {
          title: "My Run Drop",
          text: `${shareText} Made with PaceDrop`,
          url: window.location.href,
        };
        if (navigator.share) {
          try { await navigator.share(shareData); } catch (e) { /* user cancelled */ }
        } else {
          try {
            await navigator.clipboard.writeText(`${shareData.text}\n${shareData.url}`);
            alert("Copied to clipboard!");
          } catch (e) { /* fallback */ }
        }
      };

      return (
        <div className="run-drop-card" id="run-drop-card">
          <div className="run-drop-header">
            <div className="run-drop-badge">{badgeText}</div>
            <div className="run-drop-brand">PaceDrop</div>
          </div>

          <svg className="run-drop-elev-svg" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
            <defs>
              <linearGradient id="dropFill" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor="rgba(15, 166, 138, 0.3)" />
                <stop offset="100%" stopColor="rgba(255, 107, 84, 0.1)" />
              </linearGradient>
              <linearGradient id="dropStroke" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stopColor="#0FA68A" />
                <stop offset="50%" stopColor="#FF6B54" />
                <stop offset="100%" stopColor="#FF8C42" />
              </linearGradient>
            </defs>
            <path d={`${pathD} L${width} ${height} L0 ${height} Z`} fill="url(#dropFill)" />
            <path d={pathD} fill="none" stroke="url(#dropStroke)" strokeWidth="2.5" />
            <circle cx={markerX} cy={markerY} r="6" fill="#FF6B54" stroke="white" strokeWidth="2">
              <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite" />
              <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" />
            </circle>
            <line x1={markerX} y1={markerY + 10} x2={markerX} y2={height} stroke="rgba(255, 107, 84, 0.3)" strokeWidth="1" strokeDasharray="3,3" />
          </svg>

          <div className="run-drop-stats">
            <div><span>{stat1Label}: </span><strong>{stat1Value}</strong></div>
            <div><span>Peak BPM: </span><strong>{featuredBpm}</strong></div>
            <div><span>{stat3Label}: </span><strong>{stat3Value}</strong></div>
          </div>

          {featuredTrack && (
            <div className="run-drop-track">
              <div className="run-drop-track-icon">&#9835;</div>
              <div>
                <div className="run-drop-track-name">{featuredTrack.name}</div>
                <div className="run-drop-track-artist">{featuredTrack.artist}</div>
              </div>
              <div className="run-drop-track-bpm">{featuredTrack.bpm} BPM</div>
            </div>
          )}

          <button className="share-btn" onClick={handleShare}>
            {hasDrop ? "Share Your Drop" : "Share Your Run"}
          </button>
        </div>
      );
    }

    function PaceDropApp() {
      const [spotifyToken, setSpotifyToken] = useState(null);
      const [spotifyUser, setSpotifyUser] = useState(null);
      const [selectedTrail, setSelectedTrail] = useState(null);
      const [gpxTrail, setGpxTrail] = useState(null);
      const [flatRunActive, setFlatRunActive] = useState(false);
      const [flatRunDistance, setFlatRunDistance] = useState(10);
      const [targetMode, setTargetMode] = useState("pace");
      const [targetPace, setTargetPace] = useState(6);
      const [targetTime, setTargetTime] = useState(2);
      const [targetTimeHours, setTargetTimeHours] = useState(2);
      const [targetTimeMinutes, setTargetTimeMinutes] = useState(0);
      const [generatedPlaylist, setGeneratedPlaylist] = useState(null);
      const [loading, setLoading] = useState(false);
      const [message, setMessage] = useState(null);
      const [useMyTaste, setUseMyTaste] = useState(true);
      const [topSeeds, setTopSeeds] = useState(null);
      const [loadingTaste, setLoadingTaste] = useState(false);
      const [musicMode, setMusicMode] = useState("my-taste"); // "my-taste", "mood", "random", "generic"
      const [selectedMood, setSelectedMood] = useState(null);

      const MOOD_GENRES = [
        { id: "rock", label: "Rock", emoji: "🎸" },
        { id: "indie", label: "Indie", emoji: "🎶" },
        { id: "pop", label: "Pop", emoji: "🎤" },
        { id: "electronic", label: "Electronic", emoji: "🎧" },
        { id: "hip-hop", label: "Hip-Hop", emoji: "🎙️" },
        { id: "metal", label: "Metal", emoji: "🤘" },
        { id: "r-n-b", label: "R&B", emoji: "💜" },
        { id: "dance", label: "Dance", emoji: "💃" },
        { id: "classical", label: "Classical", emoji: "🎻" },
        { id: "ambient", label: "Ambient", emoji: "🌊" },
      ];

      // Handle OAuth on mount
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");

        const token = localStorage.getItem("spotifyAccessToken");
        if (token) {
          setSpotifyToken(token);
          fetchSpotifyUser(token);
        } else if (code) {
          exchangeCodeForToken(code)
            .then((token) => {
              setSpotifyToken(token);
              fetchSpotifyUser(token);
              window.history.replaceState({}, document.title, window.location.pathname);
            })
            .catch((err) => {
              setMessage({ type: "error", text: `Auth error: ${err.message}` });
            });
        }
      }, []);

      const fetchSpotifyUser = async (token) => {
        try {
          const user = await getSpotifyUser(token);
          setSpotifyUser(user);
          fetchMyTaste(token);
        } catch (err) {
          console.error("Failed to fetch user", err);
        }
      };

      const fetchMyTaste = async (token) => {
        setLoadingTaste(true);
        try {
          const [topTracksData, topArtistsData] = await Promise.all([
            getTopTracks(token, "medium_term", 20),
            getTopArtists(token, "medium_term", 10),
          ]);
          setTopSeeds({
            trackIds: topTracksData.items.map((t) => t.id),
            trackNames: topTracksData.items.slice(0, 5).map((t) => t.name),
            artistIds: topArtistsData.items.map((a) => a.id),
            artistNames: topArtistsData.items.slice(0, 5).map((a) => a.name),
            genres: [...new Set(topArtistsData.items.flatMap((a) => a.genres))].slice(0, 10),
          });
        } catch (err) {
          console.warn("Could not load listening history", err);
          setTopSeeds(null);
        } finally {
          setLoadingTaste(false);
        }
      };

      const flatRunTrail = flatRunActive
        ? {
            id: "flat-run",
            name: `Flat Run ${flatRunDistance}K`,
            location: "Custom flat route",
            distance: flatRunDistance,
            elevGain: 0,
            difficulty: "Easy",
            profile: Array(20).fill(50),
          }
        : null;

      const currentTrail = flatRunTrail || gpxTrail || selectedTrail;

      const trailElevProfile = currentTrail ? currentTrail.profile : [];
      const elevSegments = currentTrail ? calculateElevationGradient(trailElevProfile) : [];

      const trailDistance = currentTrail ? currentTrail.distance : 0;

      const trailElevGain = currentTrail ? currentTrail.elevGain : 0;

      let paceMin = targetPace;
      let estimatedTime = 0;

      if (targetMode === "pace" && trailDistance) {
        estimatedTime = trailDistance * paceMin;
      } else if (targetMode === "distance-time" && trailDistance && targetTime) {
        paceMin = targetTime / trailDistance;
      } else if (targetMode === "time" && trailDistance) {
        const hours = parseInt(targetTimeHours) || 0;
        const minutes = parseInt(targetTimeMinutes) || 0;
        const totalMinutes = hours * 60 + minutes;
        paceMin = totalMinutes / trailDistance;
      }

      const baseBpm = paceToBaseBpm(paceMin);

      const generatePlaylistTracks = async () => {
        if (!currentTrail) {
          setMessage({ type: "error", text: "Please select or import a trail" });
          return;
        }

        setLoading(true);
        try {
          const segments = elevSegments;
          const tracksBySegment = [];

          for (const seg of segments) {
            const bpm = gradientToBpm(seg.gradient, baseBpm);
            let segmentTracks = [];

            if (spotifyToken) {
              try {
                let rec;
                if (musicMode === "random" && topSeeds) {
                  const shuffledTracks = [...topSeeds.trackIds].sort(() => Math.random() - 0.5);
                  rec = await searchTracksByBpmPersonalized(
                    spotifyToken, bpm, 3,
                    shuffledTracks.slice(0, 5),
                    []
                  );
                } else if (musicMode === "mood" && selectedMood) {
                  // Mood mode: use searchTracksByBpm with selected genre (has built-in fallback)
                  rec = await searchTracksByBpm(spotifyToken, bpm, 3, selectedMood);
                } else if (musicMode === "my-taste" && topSeeds) {
                  const shuffledTracks = [...topSeeds.trackIds].sort(() => Math.random() - 0.5);
                  const shuffledArtists = [...topSeeds.artistIds].sort(() => Math.random() - 0.5);
                  rec = await searchTracksByBpmPersonalized(
                    spotifyToken, bpm, 3,
                    shuffledTracks.slice(0, 3),
                    shuffledArtists.slice(0, 2)
                  );
                } else {
                  const genres = ["electronic", "rock", "pop", "indie"];
                  const genre = genres[Math.floor(Math.random() * genres.length)];
                  rec = await searchTracksByBpm(spotifyToken, bpm, 3, genre);
                }

                // Use target BPM directly (no need for audio-features API)
                if (rec.tracks && rec.tracks.length > 0) {
                  segmentTracks = rec.tracks.map((t) => ({
                    name: t.name,
                    artist: t.artists?.[0]?.name || "Unknown Artist",
                    bpm: bpm,
                    uri: t.uri,
                  }));
                } else {
                  segmentTracks = MOCK_TRACKS.filter((t) => Math.abs(t.bpm - bpm) <= 20).slice(0, 3);
                }
              } catch (err) {
                console.warn("Spotify API error, using mock tracks", err);
                segmentTracks = MOCK_TRACKS.filter((t) => Math.abs(t.bpm - bpm) <= 20).slice(0, 3);
              }
            } else {
              segmentTracks = MOCK_TRACKS.filter((t) => Math.abs(t.bpm - bpm) <= 20).slice(0, 3);
            }

            tracksBySegment.push({
              bpm,
              tracks: segmentTracks,
            });
          }

          const allTracks = tracksBySegment.flatMap((seg) => seg.tracks);
          const allTrackUris = allTracks.map((t) => t.uri);

          setGeneratedPlaylist({
            segments: tracksBySegment,
            tracks: allTracks,
            trackUris: allTrackUris,
            pace: paceMin.toFixed(1),
            time: estimatedTime.toFixed(0),
          });

          setMessage({ type: "success", text: "Playlist generated successfully!" });
        } catch (err) {
          setMessage({ type: "error", text: `Generation error: ${err.message}` });
        } finally {
          setLoading(false);
        }
      };

      const savePlaylistToSpotify = async () => {
        if (!generatedPlaylist || !spotifyToken || !spotifyUser) {
          setMessage({ type: "error", text: "Not connected to Spotify or no playlist generated" });
          return;
        }

        // Filter out mock track URIs (they start with spotify:track:mock)
        const realTrackUris = generatedPlaylist.trackUris.filter(
          (uri) => uri && !uri.includes(":mock")
        );

        if (realTrackUris.length === 0) {
          setMessage({ type: "error", text: "No real Spotify tracks found. Try regenerating or connect to Spotify first." });
          return;
        }

        setLoading(true);
        try {
          const trailName = currentTrail?.name || "Custom Trail";
          const playlist = await createSpotifyPlaylist(
            spotifyToken,
            spotifyUser.id,
            `PaceDrop: ${trailName} @ ${targetPace.toFixed(1)}/km`,
            `Generated with PaceDrop for ${trailName} at ${paceMin.toFixed(1)} min/km pace`,
            realTrackUris
          );

          setMessage({
            type: "success",
            text: `Playlist saved! ${playlist.name} (${realTrackUris.length} tracks) - Check your Spotify library`,
          });
        } catch (err) {
          setMessage({ type: "error", text: `Save error: ${err.message}` });
        } finally {
          setLoading(false);
        }
      };

      const handleGpxUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const gpxData = parseGPX(evt.target?.result || "");
            const processed = processGPXPoints(gpxData.points);
            setGpxTrail({
              name: gpxData.name,
              distance: processed.distance,
              elevGain: processed.elevGain,
              profile: processed.profile,
            });
            setSelectedTrail(null);
            setFlatRunActive(false);
            setMessage({ type: "success", text: `GPX loaded: ${gpxData.name}` });
          } catch (err) {
            setMessage({ type: "error", text: `GPX error: ${err.message}` });
          }
        };
        reader.readAsText(file);
      };

      return (
        <div className="container">
          <header>
            <div className="logo-container">
              <div className="logo-icon">&#9835;</div>
              <h1>PaceDrop</h1>
            </div>
            <p className="tagline">Your run. Your soundtrack. Perfectly synced.</p>
          </header>

          {/* Spotify Connect Bar */}
          <div className="spotify-connect">
            <div className="spotify-status">
              <div className={`status-dot ${spotifyToken ? "" : "disconnected"}`}></div>
              <div>
                {spotifyToken ? (
                  <div className="spotify-user">
                    Connected: {spotifyUser?.display_name || "Spotify User"}
                  </div>
                ) : (
                  <div className="spotify-user">Not connected to Spotify</div>
                )}
              </div>
            </div>
            {!spotifyToken ? (
              <button className="btn btn-primary" onClick={startSpotifyAuth}>
                Connect Spotify
              </button>
            ) : (
              <button
                className="btn btn-danger"
                onClick={() => {
                  localStorage.removeItem("spotifyAccessToken");
                  localStorage.removeItem("spotifyRefreshToken");
                  localStorage.removeItem("spotifyCodeVerifier");
                  setSpotifyToken(null);
                  setSpotifyUser(null);
                  setTopSeeds(null);
                  setGeneratedPlaylist(null);
                }}
              >
                Disconnect
              </button>
            )}
          </div>

          {/* Music Mode Selector */}
          {spotifyToken && (
            <div className="section" style={{ padding: "20px", marginBottom: "20px" }}>
              <div className="section-title" style={{ marginBottom: "16px" }}>
                <span className="section-icon">&#127925;</span>
                Music Style
              </div>

              {loadingTaste && (
                <div style={{ fontSize: "0.85rem", color: "var(--slate-600)", marginBottom: "12px" }}>
                  Loading your listening history...
                </div>
              )}

              {/* Mode Tabs */}
              <div style={{ display: "flex", gap: "8px", marginBottom: "16px", flexWrap: "wrap" }}>
                {[
                  { id: "my-taste", label: "My Taste", emoji: "&#10024;", desc: "Based on what you listen to" },
                  { id: "mood", label: "Mood", emoji: "&#127926;", desc: "Pick a genre" },
                  { id: "random", label: "Shuffle", emoji: "&#128256;", desc: "Random from your history" },
                  { id: "generic", label: "Explore", emoji: "&#127758;", desc: "Generic recommendations" },
                ].map((mode) => (
                  <button
                    key={mode.id}
                    onClick={() => setMusicMode(mode.id)}
                    disabled={mode.id !== "generic" && mode.id !== "mood" && !topSeeds}
                    style={{
                      flex: "1 1 auto",
                      minWidth: "100px",
                      padding: "10px 14px",
                      border: musicMode === mode.id
                        ? "1px solid var(--coral)"
                        : "1px solid rgba(26, 39, 68, 0.1)",
                      borderRadius: "10px",
                      background: musicMode === mode.id
                        ? "rgba(255, 107, 84, 0.08)"
                        : "var(--cloud)",
                      color: musicMode === mode.id ? "var(--navy)" : "var(--slate-600)",
                      cursor: "pointer",
                      textAlign: "center",
                      transition: "all 0.2s ease",
                      opacity: (mode.id !== "generic" && mode.id !== "mood" && !topSeeds) ? 0.35 : 1,
                      fontSize: "0.85rem",
                      fontWeight: musicMode === mode.id ? 600 : 400,
                    }}
                  >
                    <div style={{ fontSize: "1.2rem", marginBottom: "4px" }} dangerouslySetInnerHTML={{ __html: mode.emoji }} />
                    <div>{mode.label}</div>
                  </button>
                ))}
              </div>

              {/* My Taste details */}
              {musicMode === "my-taste" && topSeeds && (
                <div style={{ padding: "12px", background: "var(--cloud)", borderRadius: "8px" }}>
                  <div style={{ fontSize: "0.8rem", color: "var(--slate-600)", marginBottom: "8px" }}>
                    Recommendations seeded from your top artists: <span style={{ color: "var(--navy)", fontWeight: 600 }}>{topSeeds.artistNames.slice(0, 3).join(", ")}</span> & more
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                    {topSeeds.genres.slice(0, 8).map((genre, i) => (
                      <span key={i} style={{
                        padding: "3px 10px",
                        background: "rgba(15, 166, 138, 0.08)",
                        border: "1px solid rgba(15, 166, 138, 0.2)",
                        borderRadius: "20px",
                        fontSize: "0.72rem",
                        color: "var(--teal)",
                        textTransform: "capitalize"
                      }}>
                        {genre}
                      </span>
                    ))}
                  </div>
                </div>
              )}

              {/* Mood genre picker */}
              {musicMode === "mood" && (
                <div>
                  <div style={{ fontSize: "0.85rem", color: "var(--slate-600)", marginBottom: "10px" }}>
                    Pick a mood — {topSeeds ? "tracks will match your taste within this genre" : "we'll find tracks in this genre"}
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(110px, 1fr))", gap: "8px" }}>
                    {MOOD_GENRES.map((genre) => (
                      <button
                        key={genre.id}
                        onClick={() => setSelectedMood(genre.id)}
                        style={{
                          padding: "10px 8px",
                          border: selectedMood === genre.id
                            ? "1px solid var(--teal)"
                            : "1px solid rgba(26, 39, 68, 0.1)",
                          borderRadius: "10px",
                          background: selectedMood === genre.id
                            ? "rgba(15, 166, 138, 0.08)"
                            : "var(--cloud)",
                          color: selectedMood === genre.id ? "var(--navy)" : "var(--slate-600)",
                          cursor: "pointer",
                          textAlign: "center",
                          transition: "all 0.2s ease",
                          fontSize: "0.85rem",
                          fontWeight: selectedMood === genre.id ? 600 : 400,
                        }}
                      >
                        <div style={{ fontSize: "1.3rem", marginBottom: "4px" }}>{genre.emoji}</div>
                        <div>{genre.label}</div>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Random shuffle details */}
              {musicMode === "random" && topSeeds && (
                <div style={{ padding: "12px", background: "var(--cloud)", borderRadius: "8px" }}>
                  <div style={{ fontSize: "0.85rem", color: "var(--slate-600)" }}>
                    Each segment will pull random seeds from your <span style={{ color: "var(--navy)", fontWeight: 600 }}>{topSeeds.trackIds.length} top tracks</span> — expect a wild mix across all your genres!
                  </div>
                </div>
              )}

              {/* Generic details */}
              {musicMode === "generic" && (
                <div style={{ padding: "12px", background: "var(--cloud)", borderRadius: "8px" }}>
                  <div style={{ fontSize: "0.85rem", color: "var(--slate-600)" }}>
                    Discover new music with recommendations from popular genres (electronic, rock, pop).
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Messages */}
          {message && (
            <div className={`message message-${message.type}`}>
              {message.text}
            </div>
          )}

          {/* GPX Import */}
          <div className="section gpx-import-container">
            <div className="section-title">
              <span className="section-icon">📁</span>
              Import Your Route (GPX)
            </div>
            <div
              className="gpx-dropzone"
              onDragOver={(e) => {
                e.preventDefault();
                e.currentTarget.classList.add("dragover");
              }}
              onDragLeave={(e) => {
                e.currentTarget.classList.remove("dragover");
              }}
              onDrop={(e) => {
                e.preventDefault();
                e.currentTarget.classList.remove("dragover");
                const file = e.dataTransfer.files?.[0];
                if (file) {
                  const reader = new FileReader();
                  reader.onload = (evt) => {
                    try {
                      const gpxData = parseGPX(evt.target?.result || "");
                      const processed = processGPXPoints(gpxData.points);
                      setGpxTrail({
                        name: gpxData.name,
                        distance: processed.distance,
                        elevGain: processed.elevGain,
                        profile: processed.profile,
                      });
                      setSelectedTrail(null);
                      setMessage({ type: "success", text: `GPX loaded: ${gpxData.name}` });
                    } catch (err) {
                      setMessage({ type: "error", text: `GPX error: ${err.message}` });
                    }
                  };
                  reader.readAsText(file);
                }
              }}
              onClick={() => {
                const input = document.createElement("input");
                input.type = "file";
                input.accept = ".gpx";
                input.onchange = (e) => {
                  const file = e.target.files?.[0];
                  if (file) {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                      try {
                        const gpxData = parseGPX(evt.target?.result || "");
                        const processed = processGPXPoints(gpxData.points);
                        setGpxTrail({
                          name: gpxData.name,
                          distance: processed.distance,
                          elevGain: processed.elevGain,
                          profile: processed.profile,
                        });
                        setSelectedTrail(null);
                        setMessage({
                          type: "success",
                          text: `GPX loaded: ${gpxData.name}`,
                        });
                      } catch (err) {
                        setMessage({
                          type: "error",
                          text: `GPX error: ${err.message}`,
                        });
                      }
                    };
                    reader.readAsText(file);
                  }
                };
                input.click();
              }}
            >
              {gpxTrail ? (
                <>
                  <div className="gpx-dropzone-file">✓ {gpxTrail.name}</div>
                  <div className="gpx-dropzone-text">
                    {gpxTrail.distance}km, {gpxTrail.elevGain}m gain
                  </div>
                </>
              ) : (
                <>
                  <div className="gpx-dropzone-text">Drop GPX file here or click to browse</div>
                  <div className="gpx-dropzone-text" style={{ fontSize: "0.8rem" }}>
                    Supported: .gpx
                  </div>
                </>
              )}
            </div>
            {gpxTrail && (
              <button
                className="btn btn-secondary"
                onClick={() => {
                  setGpxTrail(null);
                  setMessage({ type: "info", text: "GPX trail cleared" });
                }}
              >
                Clear GPX
              </button>
            )}
          </div>

          {/* Choose Trail */}
          <div className="section">
            <div className="section-title">
              <span className="section-icon">🏔️</span>
              Popular Routes {gpxTrail ? "(or use your GPX above)" : ""}
            </div>
            <div className="trails-grid">
              {FRENCH_TRAILS.map((trail) => (
                <div
                  key={trail.id}
                  className={`trail-card ${!flatRunActive && selectedTrail?.id === trail.id ? "selected" : ""}`}
                  onClick={() => {
                    setSelectedTrail(trail);
                    setGpxTrail(null);
                    setFlatRunActive(false);
                  }}
                >
                  <h3>{trail.name}</h3>
                  <p className="trail-location">{trail.location}</p>
                  <div className="trail-stats">
                    <div className="trail-stat">
                      <div className="trail-stat-label">Distance</div>
                      <div className="trail-stat-value">{trail.distance}km</div>
                    </div>
                    <div className="trail-stat">
                      <div className="trail-stat-label">Gain</div>
                      <div className="trail-stat-value">{trail.elevGain}m</div>
                    </div>
                  </div>
                  <ElevationSparkline profile={trail.profile} />
                  <span className={`difficulty-badge difficulty-${trail.difficulty.toLowerCase()}`}>
                    {trail.difficulty}
                  </span>
                </div>
              ))}
            </div>

            {/* Flat Run Option */}
            <div className={`flat-run-section ${flatRunActive ? "active" : ""}`}>
              <div
                className="flat-run-header"
                onClick={() => {
                  if (!flatRunActive) {
                    setFlatRunActive(true);
                    setSelectedTrail(null);
                    setGpxTrail(null);
                  } else {
                    setFlatRunActive(false);
                  }
                }}
              >
                <h3>🏃 Flat Run — no elevation, just pace</h3>
                <button className={`flat-run-toggle ${flatRunActive ? "deselect" : ""}`}>
                  {flatRunActive ? "Deselect" : "Select"}
                </button>
              </div>
              {flatRunActive && (
                <>
                  <div className="flat-run-controls">
                    <div className="flat-run-distance-input">
                      <label>Distance:</label>
                      <input
                        type="number"
                        min="1"
                        max="200"
                        value={flatRunDistance}
                        onChange={(e) => {
                          const v = Math.max(1, Math.min(200, parseInt(e.target.value) || 1));
                          setFlatRunDistance(v);
                        }}
                      />
                      <span>km</span>
                    </div>
                    <div className="flat-run-distance-input" style={{ flex: 1 }}>
                      <input
                        type="range"
                        min="1"
                        max="100"
                        value={Math.min(flatRunDistance, 100)}
                        onChange={(e) => setFlatRunDistance(parseInt(e.target.value))}
                        style={{ width: "100%" }}
                      />
                    </div>
                  </div>
                  <div className="flat-run-preview">
                    <div><strong>{flatRunDistance} km</strong> distance</div>
                    <div><strong>0 m</strong> elevation gain</div>
                    <div>Constant BPM throughout</div>
                  </div>
                </>
              )}
            </div>
          </div>

          {/* Elevation Chart & BPM */}
          {currentTrail && (
            <div className="section">
              <div className="section-title">
                <span className="section-icon">📊</span>
                {currentTrail.name}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px", marginBottom: "20px" }}>
                <div>
                  <div className="control-label">Total Distance</div>
                  <div className="control-value">{trailDistance.toFixed(1)}km</div>
                </div>
                <div>
                  <div className="control-label">Elevation Gain</div>
                  <div className="control-value">{trailElevGain}m</div>
                </div>
              </div>
              <ElevationChart profile={trailElevProfile} segments={elevSegments} />
            </div>
          )}

          {/* Set Your Target */}
          {currentTrail && (
            <div className="section">
              <div className="section-title">
                <span className="section-icon">⏱️</span>
                Set Your Target
              </div>

              <div className="tabs-container">
                <button
                  className={`tab-button ${targetMode === "pace" ? "active" : ""}`}
                  onClick={() => setTargetMode("pace")}
                >
                  Target Pace
                </button>
                <button
                  className={`tab-button ${targetMode === "distance-time" ? "active" : ""}`}
                  onClick={() => setTargetMode("distance-time")}
                >
                  Distance + Time
                </button>
                <button
                  className={`tab-button ${targetMode === "time" ? "active" : ""}`}
                  onClick={() => setTargetMode("time")}
                >
                  Target Time
                </button>
              </div>

              {targetMode === "pace" && (
                <div className="control-group">
                  <label className="control-label">
                    Target Pace: <span className="control-value">{targetPace.toFixed(2)} min/km</span>
                  </label>
                  <input
                    type="range"
                    min="3"
                    max="10"
                    step="0.1"
                    value={targetPace}
                    onChange={(e) => setTargetPace(parseFloat(e.target.value))}
                  />
                  <div style={{ marginTop: "12px", color: "var(--slate-400)", fontSize: "0.9rem" }}>
                    Estimated time: {(trailDistance * targetPace).toFixed(0)} min
                  </div>
                </div>
              )}

              {targetMode === "distance-time" && (
                <div className="control-group">
                  <label className="control-label">
                    Total Time: <span className="control-value">{targetTime.toFixed(1)} hours</span>
                  </label>
                  <input
                    type="range"
                    min="0.5"
                    max="12"
                    step="0.25"
                    value={targetTime}
                    onChange={(e) => setTargetTime(parseFloat(e.target.value))}
                  />
                  <div style={{ marginTop: "12px", color: "var(--slate-400)", fontSize: "0.9rem" }}>
                    Pace: {(targetTime / trailDistance).toFixed(2)} min/km
                  </div>
                </div>
              )}

              {targetMode === "time" && (
                <div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px", marginBottom: "20px" }}>
                    <div className="control-group">
                      <label className="control-label">
                        Hours: <span className="control-value">{targetTimeHours}</span>
                      </label>
                      <input
                        type="number"
                        min="0"
                        max="24"
                        value={targetTimeHours}
                        onChange={(e) => setTargetTimeHours(e.target.value)}
                      />
                    </div>
                    <div className="control-group">
                      <label className="control-label">
                        Minutes: <span className="control-value">{targetTimeMinutes}</span>
                      </label>
                      <input
                        type="number"
                        min="0"
                        max="59"
                        value={targetTimeMinutes}
                        onChange={(e) => setTargetTimeMinutes(e.target.value)}
                      />
                    </div>
                  </div>
                  <div style={{ color: "var(--slate-400)", fontSize: "0.9rem" }}>
                    Pace: {paceMin.toFixed(2)} min/km
                  </div>
                </div>
              )}

              <div style={{ marginTop: "20px", padding: "12px", background: "rgba(255, 107, 84, 0.06)", borderRadius: "8px" }}>
                <div className="control-label">Base BPM for Target Pace</div>
                <div className="control-value">{Math.round(baseBpm)} BPM</div>
              </div>
            </div>
          )}

          {/* Generate Button */}
          {currentTrail && (
            <button
              className="btn btn-primary"
              style={{ width: "100%", padding: "16px", fontSize: "1.1rem", marginBottom: "24px" }}
              onClick={generatePlaylistTracks}
              disabled={loading}
            >
              {loading ? "Generating..." : "Generate Playlist"}
            </button>
          )}

          {/* Playlist Results */}
          {generatedPlaylist && (
            <div className="section playlist-results">
              <div className="section-title">
                <span className="section-icon">🎵</span>
                Your Generated Playlist
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px", marginBottom: "20px" }}>
                <div>
                  <div className="control-label">Pace</div>
                  <div className="control-value">{generatedPlaylist.pace} min/km</div>
                </div>
                <div>
                  <div className="control-label">Estimated Time</div>
                  <div className="control-value">{generatedPlaylist.time} minutes</div>
                </div>
              </div>

              <div className="control-label" style={{ marginBottom: "12px" }}>
                BPM by Terrain
              </div>
              <div className="bpm-phases">
                {generatedPlaylist.segments.map((seg, idx) => (
                  <div key={idx} className="bpm-phase">
                    <div className="bpm-phase-label">
                      {seg.gradient > 0.05 ? "⬆️ Up" : seg.gradient < -0.05 ? "⬇️ Down" : "➡️ Flat"}
                    </div>
                    <div className="bpm-phase-value">{seg.bpm}</div>
                  </div>
                ))}
              </div>

              <div className="control-label" style={{ marginTop: "20px", marginBottom: "12px" }}>
                Tracks ({generatedPlaylist.tracks.length})
              </div>
              <div className="tracks-list">
                {generatedPlaylist.tracks.map((track, idx) => (
                  <div key={idx} className="track-item">
                    <div className="track-thumbnail">{(idx % 5) + 1}</div>
                    <div className="track-info">
                      <div className="track-name">{track.name}</div>
                      <div className="track-artist">{track.artist}</div>
                    </div>
                    <div className="track-bpm">{track.bpm} BPM</div>
                  </div>
                ))}
              </div>

              {/* Run Drop Card */}
              <RunDropCard playlist={generatedPlaylist} trail={currentTrail} baseBpm={baseBpm} />

              {spotifyToken && (
                <button
                  className="btn btn-primary"
                  style={{ width: "100%", padding: "14px", marginTop: "20px", fontSize: "1rem" }}
                  onClick={savePlaylistToSpotify}
                  disabled={loading}
                >
                  {loading ? "Saving..." : "Save to Spotify"}
                </button>
              )}
            </div>
          )}

          {loading && !generatedPlaylist && (
            <div className="loading">
              <div className="spinner"></div>
              <div>Building your playlist...</div>
            </div>
          )}

          <footer>
            <p>
              PaceDrop · Your run, your soundtrack · Powered by Spotify
            </p>
          </footer>
        </div>
      );
    }

    // ============ ERROR BOUNDARY ============
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error("Error caught:", error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="container" style={{ paddingTop: "40px" }}>
              <div className="message message-error">
                <strong>Something went wrong:</strong> {this.state.error?.message}
              </div>
            </div>
          );
        }

        return this.props.children;
      }
    }

    // ============ RENDER ============
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(ErrorBoundary, null, React.createElement(PaceDropApp)));
  </script>
</body>
</html>
