<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaceDrop &ndash; Your Run. Your Soundtrack. Perfectly Synced.</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --coral: #E45A3B;
      --coral-dark: #C94930;
      --teal: #0FA68A;
      --teal-dark: #0D8E76;
      --navy: #0D1B2A;
      --navy-deep: #080F1A;
      --amber: #E8782F;
      --accent-blue: #2D6CDF;
      --slate-600: #415A77;
      --slate-400: #778DA9;
      --slate-200: #C8D1DC;
      --slate-100: #E8ECF1;
      --cloud: #F7F8FA;
      --green-500: #10b981;
      --green-600: #059669;
      --red-500: #ef4444;
      --red-600: #dc2626;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--cloud);
      color: var(--navy);
      line-height: 1.6;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* Header & Logo — Hoka/Salomon-inspired bold athletic branding */
    header {
      text-align: center;
      margin-bottom: 40px;
      padding: 36px 20px 30px;
      background: var(--navy);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--coral), var(--amber), var(--coral));
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 10px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: var(--coral);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      color: white;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 6px;
      color: white;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }

    .tagline {
      color: var(--slate-400);
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* Spotify Connect Bar */
    .spotify-connect {
      background: white;
      border: 1px solid rgba(26, 39, 68, 0.1);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(26, 39, 68, 0.06);
    }

    .spotify-status {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--teal);
      animation: pulse 2s infinite;
    }

    .status-dot.disconnected {
      background: var(--slate-400);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .spotify-user {
      font-size: 0.9rem;
      color: var(--slate-600);
    }

    .btn {
      padding: 11px 22px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      transition: all 0.25s ease;
    }

    .btn-primary {
      background: var(--coral);
      color: white;
    }

    .btn-primary:hover {
      background: var(--coral-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(228, 90, 59, 0.3);
    }

    .btn-secondary {
      background: rgba(15, 166, 138, 0.08);
      color: var(--teal);
      border: 1px solid var(--teal);
    }

    .btn-secondary:hover {
      background: rgba(15, 166, 138, 0.15);
      transform: translateY(-2px);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.08);
      color: var(--red-500);
      border: 1px solid var(--red-500);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.15);
    }

    /* Section Styling */
    .section {
      background: white;
      border: 1px solid rgba(13, 27, 42, 0.06);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(13, 27, 42, 0.04);
    }

    .section-title {
      font-size: 1.15rem;
      margin-bottom: 20px;
      color: var(--navy);
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .section-icon {
      font-size: 1.4rem;
    }

    /* GPX Import */
    .gpx-import-container {
      margin-bottom: 30px;
    }

    .gpx-dropzone {
      border: 2px dashed rgba(15, 166, 138, 0.4);
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      background: rgba(15, 166, 138, 0.03);
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .gpx-dropzone:hover {
      border-color: var(--teal);
      background: rgba(15, 166, 138, 0.08);
    }

    .gpx-dropzone.dragover {
      border-color: var(--teal);
      background: rgba(15, 166, 138, 0.12);
    }

    .gpx-input {
      display: none;
    }

    .gpx-dropzone-text {
      color: var(--slate-600);
      margin-bottom: 8px;
    }

    .gpx-dropzone-file {
      font-size: 0.9rem;
      color: var(--teal);
      font-weight: 600;
    }

    .gpx-loaded {
      background: rgba(15, 166, 138, 0.08);
      border-color: var(--teal);
      color: var(--teal);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Trail Cards Grid */
    .trails-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .trail-card {
      background: white;
      border: 1.5px solid rgba(13, 27, 42, 0.06);
      border-radius: 12px;
      padding: 18px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .trail-card:hover {
      transform: translateY(-3px);
      border-color: var(--navy);
      box-shadow: 0 8px 20px rgba(13, 27, 42, 0.1);
    }

    .trail-card.selected {
      border-color: var(--coral);
      background: rgba(228, 90, 59, 0.04);
      box-shadow: 0 0 0 2px rgba(228, 90, 59, 0.15);
    }

    .flat-run-section {
      background: var(--cloud);
      border: 1px dashed rgba(15, 166, 138, 0.4);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    .flat-run-section.active {
      border-style: solid;
      border-color: var(--teal);
      background: rgba(15, 166, 138, 0.06);
    }

    .flat-run-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .flat-run-header h3 {
      font-size: 1.05rem;
      color: var(--teal);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .flat-run-toggle {
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .flat-run-toggle:hover {
      background: var(--teal-dark);
    }

    .flat-run-toggle.deselect {
      background: var(--slate-400);
    }

    .flat-run-controls {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .flat-run-distance-input {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .flat-run-distance-input label {
      color: var(--slate-600);
      font-size: 0.9rem;
    }

    .flat-run-distance-input input[type="number"] {
      width: 80px;
      background: white;
      border: 1px solid rgba(26, 39, 68, 0.15);
      border-radius: 8px;
      color: var(--navy);
      padding: 8px 12px;
      font-size: 1rem;
      text-align: center;
    }

    .flat-run-distance-input input[type="range"] {
      flex: 1;
      min-width: 120px;
    }

    .flat-run-distance-input span {
      color: var(--navy);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .flat-run-preview {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(15, 166, 138, 0.05);
      border-radius: 8px;
      display: flex;
      gap: 24px;
      font-size: 0.9rem;
      color: var(--slate-600);
    }

    .flat-run-preview strong {
      color: var(--navy);
    }

    .trail-card h3 {
      font-size: 0.95rem;
      margin-bottom: 4px;
      color: var(--navy);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .trail-location {
      font-size: 0.8rem;
      color: var(--slate-400);
      margin-bottom: 10px;
    }

    .trail-stats {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 0.85rem;
    }

    .trail-stat {
      flex: 1;
    }

    .trail-stat-label {
      color: var(--slate-400);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .trail-stat-value {
      color: var(--navy);
      font-weight: 700;
      font-size: 0.95rem;
    }

    .trail-sparkline {
      width: 100%;
      height: 30px;
      margin-top: 10px;
    }

    .difficulty-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 10px;
    }

    .difficulty-easy {
      background: rgba(15, 166, 138, 0.12);
      color: var(--teal);
    }

    .difficulty-medium {
      background: rgba(255, 140, 66, 0.12);
      color: var(--amber);
    }

    .difficulty-hard {
      background: rgba(255, 107, 84, 0.12);
      color: var(--coral);
    }

    .trail-search-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .trail-search-wrapper {
      position: relative;
      flex: 1;
    }

    .trail-search-input {
      flex: 1;
      padding: 10px 16px 10px 40px;
      border: 2px solid var(--slate-200);
      border-radius: 12px;
      font-size: 0.95rem;
      background: white;
      transition: border-color 0.2s;
      outline: none;
    }

    .trail-search-input:focus {
      border-color: var(--coral);
    }

    .trail-search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--slate-400);
      font-size: 0.9rem;
    }

    .trail-filter-chips {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1.5px solid var(--slate-200);
      background: white;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--slate-400);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .filter-chip:hover {
      border-color: var(--navy);
      color: var(--navy);
    }

    .filter-chip.active {
      background: var(--navy);
      color: white;
      border-color: var(--navy);
    }

    .trail-card-badges {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 4px;
    }

    .type-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .type-badge.road {
      background: #EEF2FF;
      color: #4F46E5;
    }

    .type-badge.trail {
      background: #ECFDF5;
      color: #059669;
    }

    .upcoming-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      background: var(--coral);
      color: white;
      animation: pulse-soft 2s infinite;
    }

    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .trail-country {
      font-size: 0.85rem;
      color: var(--slate-400);
      margin-top: 2px;
    }

    .no-results-message {
      text-align: center;
      padding: 40px 20px;
      color: var(--slate-400);
      font-size: 0.95rem;
    }

    /* Elevation Chart */
    .elevation-chart {
      width: 100%;
      margin: 20px 0;
      border-radius: 8px;
      background: var(--cloud);
      padding: 16px;
    }

    .chart-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      color: var(--slate-400);
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    /* Target Mode Tabs */
    .tabs-container {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(26, 39, 68, 0.1);
    }

    .tab-button {
      padding: 12px 16px;
      background: none;
      border: none;
      color: var(--slate-400);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab-button:hover {
      color: var(--coral);
    }

    .tab-button.active {
      color: var(--coral);
      border-bottom-color: var(--coral);
    }

    /* Input & Slider Styling */
    .control-group {
      margin-bottom: 20px;
    }

    .control-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--navy);
      font-size: 0.95rem;
    }

    .control-value {
      color: var(--coral);
      font-weight: 700;
      font-size: 1.1rem;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, var(--coral), var(--slate-400), var(--teal));
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--coral);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(255, 107, 84, 0.4);
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      width: 24px;
      height: 24px;
      box-shadow: 0 4px 12px rgba(255, 107, 84, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--coral);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(255, 107, 84, 0.4);
      transition: all 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      width: 24px;
      height: 24px;
      box-shadow: 0 4px 12px rgba(255, 107, 84, 0.6);
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--cloud);
      border: 1px solid rgba(26, 39, 68, 0.12);
      border-radius: 8px;
      color: var(--navy);
      font-size: 1rem;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: var(--coral);
      background: white;
      box-shadow: 0 0 0 3px rgba(255, 107, 84, 0.1);
    }

    /* Playlist Results */
    .playlist-results {
      margin-top: 20px;
    }

    .bpm-phases {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
      margin: 20px 0;
    }

    .bpm-phase {
      background: var(--cloud);
      border: 1px solid rgba(26, 39, 68, 0.08);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .bpm-phase-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--slate-400);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .bpm-phase-value {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--coral), var(--amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tracks-list {
      margin-top: 20px;
      display: grid;
      gap: 12px;
    }

    .track-item {
      background: var(--cloud);
      border: 1px solid rgba(26, 39, 68, 0.06);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .track-thumbnail {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--coral), var(--amber));
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 1.2rem;
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-name {
      font-weight: 600;
      color: var(--navy);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 0.85rem;
      color: var(--slate-600);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-bpm {
      background: rgba(255, 107, 84, 0.08);
      border: 1px solid var(--coral);
      color: var(--coral);
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .track-terrain {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--slate-400);
      flex-shrink: 0;
    }

    /* Loading & Messages */
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--slate-600);
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 107, 84, 0.2);
      border-top-color: var(--coral);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message {
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }

    .message-info {
      background: rgba(15, 166, 138, 0.08);
      border: 1px solid rgba(15, 166, 138, 0.2);
      color: var(--teal);
    }

    .message-success {
      background: rgba(15, 166, 138, 0.08);
      border: 1px solid rgba(15, 166, 138, 0.2);
      color: var(--teal);
    }

    .message-error {
      background: rgba(255, 107, 84, 0.08);
      border: 1px solid rgba(255, 107, 84, 0.2);
      color: var(--coral);
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 50px;
      padding: 20px;
      color: var(--slate-400);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* Run Drop Card */
    .run-drop-card {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
      border-radius: 16px;
      padding: 24px;
      margin-top: 20px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .run-drop-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 107, 84, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .run-drop-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .run-drop-badge {
      background: linear-gradient(135deg, var(--coral), var(--amber));
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .run-drop-brand {
      font-size: 0.8rem;
      opacity: 0.6;
      font-weight: 600;
    }
    .run-drop-elev-svg {
      width: 100%;
      height: 100px;
      margin: 12px 0;
    }
    .run-drop-stats {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      font-size: 0.85rem;
    }
    .run-drop-stats span {
      opacity: 0.7;
    }
    .run-drop-stats strong {
      color: var(--coral);
    }
    .run-drop-track {
      margin-top: 16px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.06);

    // ============ UTILITY FUNCTIONS ============
    function generateRandomString(length) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      let result = "";
      for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    async function sha256(plain) {
      const encoder = new TextEncoder();
      const data = encoder.encode(plain);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      return hashBuffer;
    }

    function base64encode(input) {
      return btoa(String.fromCharCode.apply(null, new Uint8Array(input)))
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=/g, "");
    }

    async function generateCodeChallenge(codeVerifier) {
      const hash = await sha256(codeVerifier);
      return base64encode(hash);
    }

    function gradientToBpm(gradient, baseBpm) {
      const uphillDrop = Math.max(0, gradient) * 250;
      const downhillBoost = Math.max(0, -gradient) * 200;
      const bpm = baseBpm - uphillDrop + downhillBoost;
      return Math.round(Math.max(95, Math.min(180, bpm)));
    }

    function paceToBaseBpm(minPerKm) {
      const bpm = 220 - minPerKm * 15;
      return Math.max(105, Math.min(175, bpm));
    }

    function calculateElevationGradient(elevProfile) {
      const segments = [];
      const segmentSize = Math.ceil(elevProfile.length / 20);
      for (let i = 0; i < elevProfile.length - 1; i += segmentSize) {
        const endIdx = Math.min(i + segmentSize, elevProfile.length - 1);
        const elevGain = elevProfile[endIdx] - elevProfile[i];
        const distance = (segmentSize / elevProfile.length) * 100;
        const gradient = distance > 0 ? elevGain / distance : 0;
        segments.push({ gradient, elevGain, startIdx: i, endIdx });
      }
      return segments;
    }

    function parseGPX(xmlString) {
      try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlString, "application/xml");
        if (doc.parseError) throw new Error("Invalid GPX file");

        const trkpts = doc.querySelectorAll("trkpt");
        const points = [];

        for (const pt of trkpts) {
          const lat = parseFloat(pt.getAttribute("lat"));
          const lon = parseFloat(pt.getAttribute("lon"));
          const eleNode = pt.querySelector("ele");
          const ele = eleNode ? parseFloat(eleNode.textContent) : 0;
          points.push({ lat, lon, ele });
        }

        const nameNode = doc.querySelector("trk > name") || doc.querySelector("metadata > name");
        const name = nameNode ? nameNode.textContent : "Custom GPX Trail";

        return { points, name };
      } catch (err) {
        throw new Error(`GPX parsing failed: ${err.message}`);
      }
    }

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const phi1 = (lat1 * Math.PI) / 180;
      const phi2 = (lat2 * Math.PI) / 180;
      const dPhi = ((lat2 - lat1) * Math.PI) / 180;
      const dLambda = ((lon2 - lon1) * Math.PI) / 180;
      const a =
        Math.sin(dPhi / 2) ** 2 +
        Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLambda / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function processGPXPoints(points) {
      if (!points || points.length < 2) {
        throw new Error("GPX file must have at least 2 points");
      }

      let totalDistance = 0;
      for (let i = 0; i < points.length - 1; i++) {
        totalDistance += haversineDistance(
          points[i].lat,
          points[i].lon,
          points[i + 1].lat,
          points[i + 1].lon
        );
      }
      totalDistance /= 1000;

      const elevProfile = points.map((p) => p.ele);
      let elevGain = 0;
      for (let i = 1; i < elevProfile.length; i++) {
        if (elevProfile[i] > elevProfile[i - 1]) {
          elevGain += elevProfile[i] - elevProfile[i - 1];
        }
      }

      const resampledProfile = [];
      const targetCount = 25;
      for (let i = 0; i < targetCount; i++) {
        const idx = Math.floor((i / (targetCount - 1)) * (elevProfile.length - 1));
        resampledProfile.push(Math.round(elevProfile[idx]));
      }

      return {
        distance: Math.round(totalDistance * 10) / 10,
        elevGain: Math.round(elevGain),
        profile: resampledProfile,
      };
    }

    // ============ SPOTIFY AUTH ============
    async function startSpotifyAuth() {
      const codeVerifier = generateRandomString(128);
      localStorage.setItem("spotifyCodeVerifier", codeVerifier);

      const codeChallenge = await generateCodeChallenge(codeVerifier);
      const params = new URLSearchParams({
        response_type: "code",
        client_id: SPOTIFY_CLIENT_ID,
        scope: SPOTIFY_SCOPES,
        redirect_uri: SPOTIFY_REDIRECT_URI,
        code_challenge_method: "S256",
        code_challenge: codeChallenge,
      });

      window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
    }

    async function exchangeCodeForToken(code) {
      const codeVerifier = localStorage.getItem("spotifyCodeVerifier");
      if (!codeVerifier) throw new Error("Code verifier not found");

      const params = new URLSearchParams({
        grant_type: "authorization_code",
        code: code,
        redirect_uri: SPOTIFY_REDIRECT_URI,
        client_id: SPOTIFY_CLIENT_ID,
        code_verifier: codeVerifier,
      });

      const response = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString(),
      });

      if (!response.ok) throw new Error("Token exchange failed");

      const data = await response.json();
      localStorage.setItem("spotifyAccessToken", data.access_token);
      localStorage.setItem("spotifyRefreshToken", data.refresh_token);
      localStorage.removeItem("spotifyCodeVerifier");

      return data.access_token;
    }

    async function refreshSpotifyToken(refreshToken) {
      const params = new URLSearchParams({
        grant_type: "refresh_token",
        refresh_token: refreshToken,
        client_id: SPOTIFY_CLIENT_ID,
      });

      const response = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString(),
      });

      if (!response.ok) throw new Error("Token refresh failed");

      const data = await response.json();
      localStorage.setItem("spotifyAccessToken", data.access_token);
      return data.access_token;
    }

    async function spotifyFetch(token, endpoint) {
      let currentToken = token;
      let response = await fetch(`https://api.spotify.com/v1${endpoint}`, {
        headers: { Authorization: `Bearer ${currentToken}` },
      });

      if (response.status === 401) {
        const refreshToken = localStorage.getItem("spotifyRefreshToken");
        if (refreshToken) {
          currentToken = await refreshSpotifyToken(refreshToken);
          response = await fetch(`https://api.spotify.com/v1${endpoint}`, {
            headers: { Authorization: `Bearer ${currentToken}` },
          });
        }
      }

      if (!response.ok) throw new Error(`Spotify API error: ${response.status}`);
      return response.json();
    }

    async function getSpotifyUser(token) {
      return spotifyFetch(token, "/me");
    }

    // ── Search-based track fetching (Feb 2026: /recommendations removed for Dev Mode) ──
    // Search limit max is now 10. We paginate with offset to gather more candidates.
    async function searchTracksByBpm(token, targetBpm, limit = 10, genres = "electronic,rock,pop") {
      const genreList = genres.split(",").map(g => g.trim()).filter(Boolean);
      const allTracks = [];

      // Build varied queries from genres + energy keywords
      const queries = [
        ...genreList.map(g => `${g} running workout`),
        ...genreList.map(g => `${g} energy`),
        ...genreList.slice(0, 2).map(g => `${g} 2024 2025`),
      ];

      for (const q of queries) {
        if (allTracks.length >= limit) break;
        try {
          const params = new URLSearchParams({
            q: q,
            type: "track",
            market: "US",
            limit: 10, // Feb 2026 max
            offset: Math.floor(Math.random() * 20), // Randomize for variety
          });
          const data = await spotifyFetch(token, `/search?${params.toString()}`);
          if (data.tracks?.items?.length > 0) {
            allTracks.push(...data.tracks.items);
          }
        } catch (e) {
          console.warn("Search query failed:", q, e);
        }
      }

      // Deduplicate by track id, shuffle for variety
      const seen = new Set();
      const unique = allTracks.filter(t => {
        if (!t.id || seen.has(t.id)) return false;
        seen.add(t.id);
        return true;
      }).sort(() => Math.random() - 0.5);

      return { tracks: unique.slice(0, limit) };
    }

    // Simple search with a single query string
    async function searchTracksByQuery(token, targetBpm, limit = 10, genre = "pop") {
      const queries = [
        `${genre} running`,
        `${genre} workout`,
        `${genre} energy`,
      ];
      for (const q of queries) {
        try {
          const params = new URLSearchParams({
            q: q,
            type: "track",
            market: "US",
            limit: Math.min(limit, 10), // Feb 2026 max is 10
          });
          const data = await spotifyFetch(token, `/search?${params.toString()}`);
          if (data.tracks?.items?.length > 0) {
            const shuffled = data.tracks.items.sort(() => Math.random() - 0.5);
            return { tracks: shuffled.slice(0, limit) };
          }
        } catch (e) {
          console.warn("Search fallback query failed:", q, e);
        }
      }
      return { tracks: [] };
    }

    async function getTopTracks(token, timeRange = "medium_term", limit = 20) {
      const params = new URLSearchParams({ time_range: timeRange, limit });
      return spotifyFetch(token, `/me/top/tracks?${params.toString()}`);
    }

    async function getTopArtists(token, timeRange = "medium_term", limit = 10) {
      const params = new URLSearchParams({ time_range: timeRange, limit });
      return spotifyFetch(token, `/me/top/artists?${params.toString()}`);

    // Personalized search: uses user's top artist names + top track names as queries
    // (Feb 2026: /recommendations removed for Dev Mode — replaced with search-based approach)
    async function searchTracksByBpmPersonalized(token, targetBpm, limit = 10, seedTrackIds = [], seedArtistIds = [], topSeedsData = null) {
      const allTracks = [];

      // Strategy 1: Search by user's top artist names (most effective for taste matching)
      if (topSeedsData?.artistNames?.length > 0) {
        const artistQueries = topSeedsData.artistNames
          .sort(() => Math.random() - 0.5)
          .slice(0, 3);
        for (const artistName of artistQueries) {
          if (allTracks.length >= limit) break;
          try {
            const params = new URLSearchParams({
              q: `artist:${artistName}`,
              type: "track",
              market: "US",
              limit: 10,
              offset: Math.floor(Math.random() * 10),
            });
            const data = await spotifyFetch(token, `/search?${params.toString()}`);
            if (data.tracks?.items?.length > 0) {
              allTracks.push(...data.tracks.items);
            }
          } catch (e) {
            console.warn("Artist search failed:", artistName, e);
          }
        }
      }

      // Strategy 2: Search by user's top genres + energy keywords
      if (topSeedsData?.genres?.length > 0 && allTracks.length < limit) {
        const genreQueries = topSeedsData.genres
          .sort(() => Math.random() - 0.5)
          .slice(0, 3);
        for (const genre of genreQueries) {
          if (allTracks.length >= limit) break;
          try {
            const params = new URLSearchParams({
              q: `${genre} running`,
              type: "track",
              market: "US",
              limit: 10,
            });
            const data = await spotifyFetch(token, `/search?${params.toString()}`);
            if (data.tracks?.items?.length > 0) {
              allTracks.push(...data.tracks.items);
            }
          } catch (e) {
            console.warn("Genre search failed:", genre, e);
          }
        }
      }

      // Strategy 3: Fallback to generic energy search
      if (allTracks.length < 3) {
        const fallbackGenres = ["pop", "rock", "electronic", "indie", "hip-hop"];
        const genre = fallbackGenres[Math.floor(Math.random() * fallbackGenres.length)];
        const fallback = await searchTracksByQuery(token, targetBpm, limit, genre);
        allTracks.push(...(fallback.tracks || []));
      }

      // Deduplicate
      const seen = new Set();
      const unique = allTracks.filter(t => {
        if (!t.id || seen.has(t.id)) return false;
        seen.add(t.id);
        return true;
      }).sort(() => Math.random() - 0.5);

      return { tracks: unique.slice(0, limit) };
    }

    async function createSpotifyPlaylist(token, userId, name, description, trackUris) {
      let currentToken = token;

      // Use POST /me/playlists (Feb 2026 migration: /users/{id}/playlists was removed)
      let playlistResp = await fetch(`https://api.spotify.com/v1/me/playlists`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${currentToken}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          name: name,
          description: description,
          public: false,
        }),
      });

      // If 401, try refreshing the token
      if (playlistResp.status === 401) {
        const refreshToken = localStorage.getItem("spotifyRefreshToken");
        if (refreshToken) {
          currentToken = await refreshSpotifyToken(refreshToken);
          playlistResp = await fetch(`https://api.spotify.com/v1/me/playlists`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${currentToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              name: name,
              description: description,
              public: false,
            }),
          });
        }
      }

      if (!playlistResp.ok) {
        const errData = await playlistResp.json().catch(() => ({}));
        const errMsg = errData?.error?.message || playlistResp.statusText || "Unknown error";
        if (playlistResp.status === 403) {
          throw new Error(`Spotify denied access (403). Try disconnecting and reconnecting Spotify — click the Disconnect button, then Connect again.`);
        }
        throw new Error(`Playlist creation failed (${playlistResp.status}): ${errMsg}`);
      }
      const playlist = await playlistResp.json();

      // Add tracks (filter out any invalid URIs)
      const validUris = trackUris.filter(uri => uri && uri.startsWith("spotify:track:") && !uri.includes(":mock"));
      if (validUris.length === 0) {
        throw new Error("No valid Spotify tracks to add. Try regenerating the playlist.");
      }

      // Use POST /playlists/{id}/items (Feb 2026 migration: /tracks was renamed to /items)
      const addTracksResp = await fetch(`https://api.spotify.com/v1/playlists/${playlist.id}/items`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${currentToken}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ uris: validUris }),
      });

      if (!addTracksResp.ok) {
        const errData = await addTracksResp.json().catch(() => ({}));
        throw new Error(`Failed to add tracks: ${errData?.error?.message || addTracksResp.statusText}`);
      }
      return playlist;
    }

    // ============ SPARKLINE SVG ============
    function ElevationSparkline({ profile, width = 240, height = 30 }) {
      if (!profile || profile.length < 2) return null;

      const minElev = Math.min(...profile);
      const maxElev = Math.max(...profile);
      const elevRange = maxElev - minElev || 1;

      const points = profile.map((elev, i) => {
        const x = (i / (profile.length - 1)) * width;
        const y = height - ((elev - minElev) / elevRange) * height;
        return [x, y];
      });

      const pathData = points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]} ${p[1]}`).join(" ");

      return (
        <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} className="trail-sparkline">
          <defs>
            <linearGradient id="sparklineFill" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor="rgba(15, 166, 138, 0.25)" />
              <stop offset="100%" stopColor="rgba(255, 107, 84, 0.08)" />
            </linearGradient>
          </defs>
          <path
            d={`${pathData} L${points[points.length - 1][0]} ${height} L0 ${height} Z`}
            fill="url(#sparklineFill)"
            stroke="url(#sparklineFill)"
            strokeWidth="1.5"
          />
          <path d={pathData} fill="none" stroke="rgba(15, 166, 138, 0.7)" strokeWidth="2" />
        </svg>
      );
    }

    // ============ ELEVATION CHART ============
    function ElevationChart({ profile, segments }) {
      if (!profile || profile.length < 2) return null;

      const width = 800;
      const height = 250;
      const padding = { top: 20, right: 20, bottom: 40, left: 40 };

      const minElev = Math.min(...profile);
      const maxElev = Math.max(...profile);
      const elevRange = maxElev - minElev || 1;

      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      const points = profile.map((elev, i) => {
        const x = padding.left + (i / (profile.length - 1)) * chartWidth;
        const y = padding.top + chartHeight - ((elev - minElev) / elevRange) * chartHeight;
        return [x, y];
      });

      const pathData = points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]} ${p[1]}`).join(" ");

      const terrainSegments = segments.map((seg, idx) => {
        const startX = padding.left + (seg.startIdx / (profile.length - 1)) * chartWidth;
        const endX = padding.left + (seg.endIdx / (profile.length - 1)) * chartWidth;
        const color =
          seg.gradient > 0.05
            ? "rgba(255, 107, 84, 0.12)"
            : seg.gradient < -0.05
              ? "rgba(15, 166, 138, 0.12)"
              : "rgba(75, 94, 122, 0.08)";

        return (
          <rect
            key={idx}
            x={startX}
            y={padding.top}
            width={endX - startX + 1}
            height={chartHeight}
            fill={color}
          />
        );
      });

      return (
        <div className="elevation-chart">
          <div className="chart-title">Elevation Profile & BPM Distribution</div>
          <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ width: "100%" }}>
            <defs>
              <linearGradient id="elevFill" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor="rgba(15, 166, 138, 0.2)" />
                <stop offset="100%" stopColor="rgba(255, 107, 84, 0.05)" />
              </linearGradient>
            </defs>
            {terrainSegments}
            <path
              d={`${pathData} L${points[points.length - 1][0]} ${padding.top + chartHeight} L${padding.left} ${padding.top + chartHeight} Z`}
              fill="url(#elevFill)"
            />
            <path d={pathData} fill="none" stroke="rgba(15, 166, 138, 0.7)" strokeWidth="2.5" />

            <line
              x1={padding.left}
              y1={padding.top + chartHeight}
              x2={width - padding.right}
              y2={padding.top + chartHeight}
              stroke="rgba(148, 163, 184, 0.3)"
              strokeWidth="1"
            />

            <text x="20" y="20" fill="var(--slate-400)" fontSize="12">
              {Math.round(maxElev)}m
            </text>
            <text x="20" y={padding.top + chartHeight + 10} fill="var(--slate-400)" fontSize="12">
              {Math.round(minElev)}m
            </text>

            <text
              x={padding.left + chartWidth / 2}
              y={height - 10}
              fill="var(--slate-400)"
              fontSize="12"
              textAnchor="middle"
            >
              Distance (proportional)
            </text>
          </svg>
        </div>
      );
    }

    // ============ MAIN APP ============
    // ============ RUN DROP CARD ============
    function RunDropCard({ playlist, trail, baseBpm }) {
      if (!playlist || !trail || !playlist.segments || playlist.segments.length === 0) return null;

      const profile = trail.profile || [];
      const isFlat = !profile.length || profile.every((v) => Math.abs(v - profile[0]) < 5);

      // For trails with elevation: find the steepest descent
      let maxDrop = 0;
      let dropIdx = 0;
      for (let i = 1; i < profile.length; i++) {
        const drop = profile[i - 1] - profile[i];
        if (drop > maxDrop) {
          maxDrop = drop;
          dropIdx = i;
        }
      }

      // For flat runs: find the highest BPM segment (peak energy moment)
      let peakSegIdx = 0;
      let peakBpm = 0;
      playlist.segments.forEach((seg, idx) => {
        if (seg.bpm > peakBpm) {
          peakBpm = seg.bpm;
          peakSegIdx = idx;
        }
      });

      // Choose which moment to feature
      const hasDrop = maxDrop >= 5;
      const featuredSegIdx = hasDrop
        ? Math.min(Math.floor((dropIdx / Math.max(profile.length, 1)) * playlist.segments.length), playlist.segments.length - 1)
        : peakSegIdx;
      const featuredSegment = playlist.segments[featuredSegIdx];
      const featuredTrack = featuredSegment?.tracks?.[0];
      const featuredBpm = featuredSegment?.bpm || baseBpm;

      // Card labels
      const badgeText = hasDrop ? "The Drop" : "Peak Energy";
      const stat1Label = hasDrop ? "Drop" : "Distance";
      const stat1Value = hasDrop ? `${Math.round(maxDrop)}m` : `${trail.distance || 0}K`;
      const stat3Label = hasDrop ? "Elevation" : "Segments";
      const stat3Value = hasDrop ? `${Math.round(Math.max(...profile))}m` : `${playlist.segments.length}`;

      // SVG chart
      const width = 400;
      const height = 80;

      // For flat runs, generate a BPM waveform instead of elevation
      let pts, pathD, markerX, markerY;
      if (hasDrop && profile.length >= 2) {
        const minElev = Math.min(...profile);
        const maxElev = Math.max(...profile);
        const elevRange = maxElev - minElev || 1;
        pts = profile.map((e, i) => [
          (i / (profile.length - 1)) * width,
          height - ((e - minElev) / elevRange) * height * 0.85 - 5,
        ]);
        markerX = (dropIdx / (profile.length - 1)) * width;
        markerY = pts[dropIdx][1];
      } else {
        // BPM waveform for flat runs
        const bpms = playlist.segments.map((s) => s.bpm);
        const minBpm = Math.min(...bpms);
        const maxBpmVal = Math.max(...bpms);
        const bpmRange = maxBpmVal - minBpm || 1;
        pts = bpms.map((b, i) => [
          (i / Math.max(bpms.length - 1, 1)) * width,
          height - ((b - minBpm) / bpmRange) * height * 0.75 - 5,
        ]);
        markerX = (peakSegIdx / Math.max(bpms.length - 1, 1)) * width;
        markerY = pts[peakSegIdx] ? pts[peakSegIdx][1] : height / 2;
      }
      pathD = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");

      const handleShare = async () => {
        const shareText = hasDrop
          ? `${trail.name} — ${featuredBpm} BPM at the drop!`
          : `${trail.name} — Peak energy at ${featuredBpm} BPM!`;
        const shareData = {
          title: "My Run Drop",
          text: `${shareText} Made with PaceDrop`,
          url: window.location.href,
        };
        if (navigator.share) {
          try { await navigator.share(shareData); } catch (e) { /* user cancelled */ }
        } else {
          try {
            await navigator.clipboard.writeText(`${shareData.text}\n${shareData.url}`);
            alert("Copied to clipboard!");
          } catch (e) { /* fallback */ }
        }
      };

      return (
        <div className="run-drop-card" id="run-drop-card">
          <div className="run-drop-header">
            <div className="run-drop-badge">{badgeText}</div>
            <div className="run-drop-brand">PaceDrop</div>
          </div>

          <svg className="run-drop-elev-svg" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
            <defs>
              <linearGradient id="dropFill" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor="rgba(15, 166, 138, 0.3)" />
                <stop offset="100%" stopColor="rgba(255, 107, 84, 0.1)" />
              </linearGradient>
              <linearGradient id="dropStroke" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stopColor="#0FA68A" />
                <stop offset="50%" stopColor="#FF6B54" />
                <stop offset="100%" stopColor="#FF8C42" />
              </linearGradient>
            </defs>
            <path d={`${pathD} L${width} ${height} L0 ${height} Z`} fill="url(#dropFill)" />
            <path d={pathD} fill="none" stroke="url(#dropStroke)" strokeWidth="2.5" />
            <circle cx={markerX} cy={markerY} r="6" fill="#FF6B54" stroke="white" strokeWidth="2">
              <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite" />
              <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" />
            </circle>
            <line x1={markerX} y1={markerY + 10} x2={markerX} y2={height} stroke="rgba(255, 107, 84, 0.3)" strokeWidth="1" strokeDasharray="3,3" />
          </svg>

          <div className="run-drop-stats">
            <div><span>{stat1Label}: </span><strong>{stat1Value}</strong></div>
            <div><span>Peak BPM: </span><strong>{featuredBpm}</strong></div>
            <div><span>{stat3Label}: </span><strong>{stat3Value}</strong></div>
          </div>

          {featuredTrack && (
            <div className="run-drop-track">
              <div className="run-drop-track-icon">&#9835;</div>
              <div>
                <div className="run-drop-track-name">{featuredTrack.name}</div>
                <div className="run-drop-track-artist">{featuredTrack.artist}</div>
              </div>
              <div className="run-drop-track-bpm">{featuredTrack.bpm} BPM</div>
            </div>
          )}

          <button className="share-btn" onClick={handleShare}>
            {hasDrop ? "Share Your Drop" : "Share Your Run"}
          </button>
        </div>
      );
    }

          // Build artist affinity map: artistId → average popularity from user's top tracks
          const artistAffinityMap = new Map();
          topTracksData.items.forEach((t) => {
            (t.artists || []).forEach((a) => {
              if (!artistAffinityMap.has(a.id)) artistAffinityMap.set(a.id, []);
              artistAffinityMap.get(a.id).push(t.popularity || 0);
            });
          });
          // Convert arrays to averages
          artistAffinityMap.forEach((pops, artistId) => {
            artistAffinityMap.set(artistId, pops.reduce((a, b) => a + b, 0) / pops.length);
          });

          setTopSeeds({

            genres: [...new Set(topArtistsData.items.flatMap((a) => a.genres))].slice(0, 10),
            topTracksFull: topTracksData.items, // Full objects for scoring
            artistAffinityMap, // artistId → avg popularity from user history
          });
        } catch (err) {

      const flatRunTrail = flatRunActive

            elevGain: 0,
