            if (data.tracks?.items?.length > 0) {
              allTracks.push(...data.tracks.items);
            }
          } catch (e) {
            console.warn("Artist search failed:", artistName, e);
          }
        }
      }

      // Strategy 2: Search by user's top genres + energy keywords
      if (topSeedsData?.genres?.length > 0 && allTracks.length < limit) {
        const genreQueries = topSeedsData.genres
          .sort(() => Math.random() - 0.5)
          .slice(0, 3);
        for (const genre of genreQueries) {
          if (allTracks.length >= limit) break;
          try {
            const params = new URLSearchParams({
              q: `${genre} running`,
              type: "track",
              market: "US",
              limit: 10,
            });
            const data = await spotifyFetch(token, `/search?${params.toString()}`);
            if (data.tracks?.items?.length > 0) {
              allTracks.push(...data.tracks.items);
            }
          } catch (e) {
            console.warn("Genre search failed:", genre, e);
          }
        }
      }

      // Strategy 3: Fallback to generic energy search
      if (allTracks.length < 3) {
        const fallbackGenres = ["pop", "rock", "electronic", "indie", "hip-hop"];
        const genre = fallbackGenres[Math.floor(Math.random() * fallbackGenres.length)];
        const fallback = await searchTracksByQuery(token, targetBpm, limit, genre);
        allTracks.push(...(fallback.tracks || []));
      }

      // Deduplicate
      const seen = new Set();
      const unique = allTracks.filter(t => {
        if (!t.id || seen.has(t.id)) return false;
        seen.add(t.id);
        return true;
      }).sort(() => Math.random() - 0.5);

      return { tracks: unique.slice(0, limit) };
    }

    async function createSpotifyPlaylist(token, userId, name, description, trackUris) {
      let currentToken = token;

      // Use POST /me/playlists (Feb 2026 migration: /users/{id}/playlists was removed)
      let playlistResp = await fetch(`https://api.spotify.com/v1/me/playlists`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${currentToken}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          name: name,
          description: description,
          public: false,
        }),
      });

      // If 401, try refreshing the token
      if (playlistResp.status === 401) {
        const refreshToken = localStorage.getItem("spotifyRefreshToken");
        if (refreshToken) {
          currentToken = await refreshSpotifyToken(refreshToken);
          playlistResp = await fetch(`https://api.spotify.com/v1/me/playlists`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${currentToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              name: name,
              description: description,
              public: false,
            }),
          });
        }
      }

      if (!playlistResp.ok) {
        const errData = await playlistResp.json().catch(() => ({}));
        const errMsg = errData?.error?.message || playlistResp.statusText || "Unknown error";
        if (playlistResp.status === 403) {
          throw new Error(`Spotify denied access (403). Try disconnecting and reconnecting Spotify — click the Disconnect button, then Connect again.`);
        }
        throw new Error(`Playlist creation failed (${playlistResp.status}): ${errMsg}`);
      }
      const playlist = await playlistResp.json();

      // Add tracks (filter out any invalid URIs)
      const validUris = trackUris.filter(uri => uri && uri.startsWith("spotify:track:") && !uri.includes(":mock"));
      if (validUris.length === 0) {
        throw new Error("No valid Spotify tracks to add. Try regenerating the playlist.");
      }

      // Use POST /playlists/{id}/items (Feb 2026 migration: /tracks was renamed to /items)
      const addTracksResp = await fetch(`https://api.spotify.com/v1/playlists/${playlist.id}/items`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${currentToken}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ uris: validUris }),
      });

      if (!addTracksResp.ok) {
        const errData = await addTracksResp.json().catch(() => ({}));
        throw new Error(`Failed to add tracks: ${errData?.error?.message || addTracksResp.statusText}`);
      }
      return playlist;
    }

    // ============ SPARKLINE SVG ============
    function ElevationSparkline({ profile, width = 240, height = 30 }) {
      if (!profile || profile.length < 2) return null;

      const minElev = Math.min(...profile);
      const maxElev = Math.max(...profile);
      const elevRange = maxElev - minElev || 1;

      const points = profile.map((elev, i) => {
        const x = (i / (profile.length - 1)) * width;
        const y = height - ((elev - minElev) / elevRange) * height;
        return [x, y];
      });

      const pathData = points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]} ${p[1]}`).join(" ");

      return (
        <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} className="trail-sparkline">
          <defs>
            <linearGradient id="sparklineFill" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor="rgba(26, 158, 143, 0.25)" />
              <stop offset="100%" stopColor="rgba(201, 58, 30, 0.08)" />
            </linearGradient>
          </defs>
          <path
            d={`${pathData} L${points[points.length - 1][0]} ${height} L0 ${height} Z`}
            fill="url(#sparklineFill)"
            stroke="url(#sparklineFill)"
            strokeWidth="1.5"
          />
          <path d={pathData} fill="none" stroke="rgba(26, 158, 143, 0.7)" strokeWidth="2" />
        </svg>
      );
    }

    // ============ ELEVATION CHART ============
    function ElevationChart({ profile, segments }) {
      if (!profile || profile.length < 2) return null;

      const width = 800;
      const height = 250;
      const padding = { top: 20, right: 20, bottom: 40, left: 40 };

      const minElev = Math.min(...profile);
      const maxElev = Math.max(...profile);
      const elevRange = maxElev - minElev || 1;

      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      const points = profile.map((elev, i) => {
        const x = padding.left + (i / (profile.length - 1)) * chartWidth;
        const y = padding.top + chartHeight - ((elev - minElev) / elevRange) * chartHeight;
        return [x, y];
      });

      const pathData = points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]} ${p[1]}`).join(" ");

      const terrainSegments = segments.map((seg, idx) => {
        const startX = padding.left + (seg.startIdx / (profile.length - 1)) * chartWidth;
        const endX = padding.left + (seg.endIdx / (profile.length - 1)) * chartWidth;
        const color =
          seg.gradient > 0.05
            ? "rgba(201, 58, 30, 0.12)"
            : seg.gradient < -0.05
              ? "rgba(26, 158, 143, 0.12)"
              : "rgba(75, 94, 122, 0.08)";

        return (
          <rect
            key={idx}
            x={startX}
            y={padding.top}
            width={endX - startX + 1}
            height={chartHeight}
            fill={color}
          />
        );
      });

      return (
        <div className="elevation-chart">
          <div className="chart-title">Elevation Profile & BPM Distribution</div>
          <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ width: "100%" }}>
            <defs>
              <linearGradient id="elevFill" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor="rgba(26, 158, 143, 0.2)" />
                <stop offset="100%" stopColor="rgba(201, 58, 30, 0.05)" />
              </linearGradient>
            </defs>
            {terrainSegments}
            <path
              d={`${pathData} L${points[points.length - 1][0]} ${padding.top + chartHeight} L${padding.left} ${padding.top + chartHeight} Z`}
              fill="url(#elevFill)"
            />
            <path d={pathData} fill="none" stroke="rgba(26, 158, 143, 0.7)" strokeWidth="2.5" />

            <line
              x1={padding.left}
              y1={padding.top + chartHeight}
              x2={width - padding.right}
              y2={padding.top + chartHeight}
              stroke="rgba(148, 163, 184, 0.3)"
              strokeWidth="1"
            />

            <text x="20" y="20" fill="var(--slate-400)" fontSize="12">
              {Math.round(maxElev)}m
            </text>
            <text x="20" y={padding.top + chartHeight + 10} fill="var(--slate-400)" fontSize="12">
              {Math.round(minElev)}m
            </text>

            <text
              x={padding.left + chartWidth / 2}
              y={height - 10}
              fill="var(--slate-400)"
              fontSize="12"
              textAnchor="middle"
            >
              Distance (proportional)
            </text>
          </svg>
        </div>
      );
    }

    // ============ MAIN APP ============
    // ============ RUN DROP CARD ============
    function RunDropCard({ playlist, trail, baseBpm }) {
      if (!playlist || !trail || !playlist.segments || playlist.segments.length === 0) return null;

      const profile = trail.profile || [];
      const bpms = playlist.segments.map(s => s.bpm);
      const hasElev = profile.length >= 2 && !profile.every(v => Math.abs(v - profile[0]) < 5);

      // Featured track: highest BPM segment
      let peakIdx = 0;
      bpms.forEach((b, i) => { if (b > bpms[peakIdx]) peakIdx = i; });
      const featuredSeg = playlist.segments[peakIdx];
      const featuredTrack = featuredSeg?.tracks?.[0];

      // BPM range
      const minBpm = Math.min(...bpms);
      const maxBpm = Math.max(...bpms);

      // SVG dimensions
      const w = 400, h = 90;
      const pad = { top: 14, bot: 4 };
      const chartH = h - pad.top - pad.bot;

      // Elevation path (filled area)
      let elevPath = "";
      let elevFillPath = "";
      if (hasElev) {
        const minE = Math.min(...profile);
        const maxE = Math.max(...profile);
        const rng = maxE - minE || 1;
        const ePts = profile.map((e, i) => [
          (i / (profile.length - 1)) * w,
          pad.top + chartH - ((e - minE) / rng) * chartH * 0.85,
        ]);
        elevPath = ePts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");
        elevFillPath = `${elevPath} L${w} ${h} L0 ${h} Z`;
      }

      // BPM path (line overlay, mapped to same vertical space)
      const bpmRng = maxBpm - minBpm || 1;
      const bpmPts = bpms.map((b, i) => [
        (i / Math.max(bpms.length - 1, 1)) * w,
        pad.top + chartH - ((b - minBpm) / bpmRng) * chartH * 0.75,
      ]);
      const bpmPath = bpmPts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");

      // BPM labels at start and end
      const startBpm = bpms[0];
      const endBpm = bpms[bpms.length - 1];

      const handleShare = async () => {
        const text = `${trail.name} — ${minBpm}–${maxBpm} BPM, matched to the terrain.`;
        const shareData = { title: "PaceDrop", text: `${text} Made with PaceDrop`, url: window.location.href };
        if (navigator.share) {
          try { await navigator.share(shareData); } catch (e) {}
        } else {
          try { await navigator.clipboard.writeText(`${shareData.text}\n${shareData.url}`); alert("Copied!"); } catch (e) {}
        }
      };

      return (
        <div className="run-drop-card" id="run-drop-card">
          <div className="run-drop-header">
            <div className="run-drop-badge">{trail.name}</div>
            <div className="run-drop-brand">PaceDrop</div>
          </div>

          {/* Combined elevation + BPM profile */}
          <svg className="run-drop-elev-svg" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
            <defs>
              <linearGradient id="elevFill" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor="rgba(255,255,255,0.12)" />
                <stop offset="100%" stopColor="rgba(255,255,255,0.02)" />
              </linearGradient>
              <linearGradient id="bpmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stopColor="#1A9E8F" />
                <stop offset="50%" stopColor="#C98A0C" />
                <stop offset="100%" stopColor="#C93A1E" />
              </linearGradient>
            </defs>
            {/* Elevation filled area */}
            {hasElev && (
              <>
                <path d={elevFillPath} fill="url(#elevFill)" />
                <path d={elevPath} fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="1.5" />
              </>
            )}
            {/* BPM line — the heartbeat of the playlist */}
            <path d={bpmPath} fill="none" stroke="url(#bpmGrad)" strokeWidth="2.5" strokeLinecap="round" />
            {/* BPM dots at each segment */}
            {bpmPts.map((p, i) => (
              <circle key={i} cx={p[0]} cy={p[1]} r={i === peakIdx ? 4.5 : 2} fill={i === peakIdx ? "#C93A1E" : "rgba(255,255,255,0.5)"} stroke={i === peakIdx ? "white" : "none"} strokeWidth={i === peakIdx ? 1.5 : 0}>
                {i === peakIdx && <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" />}
              </circle>
            ))}
            {/* BPM labels */}
            <text x="4" y={bpmPts[0][1] - 5} fill="rgba(255,255,255,0.5)" fontSize="9" fontWeight="600" fontFamily="Helvetica Neue, sans-serif">{startBpm}</text>
            <text x={w - 4} y={bpmPts[bpmPts.length-1][1] - 5} fill="rgba(255,255,255,0.5)" fontSize="9" fontWeight="600" fontFamily="Helvetica Neue, sans-serif" textAnchor="end">{endBpm}</text>
            <text x={bpmPts[peakIdx][0]} y={bpmPts[peakIdx][1] - 8} fill="#C93A1E" fontSize="10" fontWeight="700" fontFamily="Helvetica Neue, sans-serif" textAnchor="middle">{maxBpm}</text>
          </svg>

          {/* Legend */}
          <div style={{ display: "flex", gap: "16px", alignItems: "center", marginTop: "4px", marginBottom: "8px" }}>
            {hasElev && (
              <div style={{ display: "flex", alignItems: "center", gap: "5px", fontSize: "0.65rem", opacity: 0.5 }}>
                <div style={{ width: "16px", height: "2px", background: "rgba(255,255,255,0.4)" }}></div>
                Elevation
              </div>
            )}
            <div style={{ display: "flex", alignItems: "center", gap: "5px", fontSize: "0.65rem", opacity: 0.7 }}>
              <div style={{ width: "16px", height: "2.5px", background: "linear-gradient(90deg, #1A9E8F, #C98A0C, #C93A1E)", borderRadius: "2px" }}></div>
              BPM
            </div>
            <div style={{ marginLeft: "auto", fontSize: "0.7rem", opacity: 0.5 }}>
              {minBpm}–{maxBpm} BPM · {playlist.segments.length} segments
            </div>
          </div>

          <div className="run-drop-stats">
            <div><span>Distance: </span><strong>{trail.distance}km</strong></div>
            {trail.elevGain > 0 && <div><span>Gain: </span><strong>{trail.elevGain}m</strong></div>}
            <div><span>Peak: </span><strong>{maxBpm} BPM</strong></div>
          </div>

          {featuredTrack && (
            <div className="run-drop-track">
              <div className="run-drop-track-icon">&#9835;</div>
              <div>
                <div className="run-drop-track-name">{featuredTrack.name}</div>
                <div className="run-drop-track-artist">{featuredTrack.artist}</div>
              </div>
              <div className="run-drop-track-bpm">{featuredTrack.bpm} BPM</div>
            </div>
          )}

          <button className="share-btn" onClick={handleShare}>
            Share
          </button>
        </div>
      );
    }

    function countryFlag(country) {
      const flags = { "France": "🇫🇷", "USA": "🇺🇸", "UK": "🇬🇧", "Germany": "🇩🇪", "Japan": "🇯🇵", "Italy": "🇮🇹", "Spain": "🇪🇸", "Switzerland": "🇨🇭" };
      return flags[country] || "🌍";
    }

    function PaceDropApp() {
      const [spotifyToken, setSpotifyToken] = useState(null);
      const [spotifyUser, setSpotifyUser] = useState(null);
      const [selectedTrail, setSelectedTrail] = useState(null);
      const [gpxTrail, setGpxTrail] = useState(null);
      const [flatRunActive, setFlatRunActive] = useState(false);
      const [flatRunDistance, setFlatRunDistance] = useState(10);
      const [targetMode, setTargetMode] = useState("pace");
      const [targetPace, setTargetPace] = useState(5);
      const [targetTime, setTargetTime] = useState(0.83);
      const [targetTimeHours, setTargetTimeHours] = useState(0);
      const [targetTimeMinutes, setTargetTimeMinutes] = useState(50);
      const [generatedPlaylist, setGeneratedPlaylist] = useState(null);
      const [loading, setLoading] = useState(false);
      const [message, setMessage] = useState(null);
      const [useMyTaste, setUseMyTaste] = useState(true);
      const [topSeeds, setTopSeeds] = useState(null);
      const [loadingTaste, setLoadingTaste] = useState(false);
      const [musicMode, setMusicMode] = useState("my-taste"); // "my-taste", "mood", "random", "generic"
      const [selectedMood, setSelectedMood] = useState(null);
      const [trailSearch, setTrailSearch] = useState("");
      const [trailFilter, setTrailFilter] = useState("all"); // "all", "road", "trail", "upcoming"
      const [stravaConnected, setStravaConnected] = useState(false);
      const [stravaActivities, setStravaActivities] = useState(null);
      const [personalModel, setPersonalModel] = useState(null);
      const [racePlan, setRacePlan] = useState(null);
      const [showPerformanceLab, setShowPerformanceLab] = useState(false);
      const [garminConnected, setGarminConnected] = useState(false);
      const [stravaApiConnected, setStravaApiConnected] = useState(false);
      const [importSources, setImportSources] = useState([]); // ["file", "strava", "garmin"]
      const [showFaq, setShowFaq] = useState(false);
      const [openFaqIdx, setOpenFaqIdx] = useState(null);

      const MOOD_GENRES = [
        { id: "rock", label: "Rock", emoji: "🎸" },
        { id: "indie", label: "Indie", emoji: "🎶" },
        { id: "pop", label: "Pop", emoji: "🎤" },
        { id: "electronic", label: "Electronic", emoji: "🎧" },
        { id: "hip-hop", label: "Hip-Hop", emoji: "🎙️" },
        { id: "metal", label: "Metal", emoji: "🤘" },
        { id: "r-n-b", label: "R&B", emoji: "💜" },
        { id: "dance", label: "Dance", emoji: "💃" },
        { id: "classical", label: "Classical", emoji: "🎻" },
        { id: "ambient", label: "Ambient", emoji: "🌊" },
      ];

      // Handle OAuth on mount — detect Spotify vs Strava vs Garmin callback
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        const state = params.get("state");

        // Restore Spotify session
        const token = localStorage.getItem("spotifyAccessToken");
        if (token) {
          setSpotifyToken(token);
          fetchSpotifyUser(token);
        }

        // Restore Strava session
        const stravaToken = localStorage.getItem("stravaAccessToken");
        if (stravaToken) {
          setStravaApiConnected(true);
        }

        // Restore Garmin session
        const garminToken = localStorage.getItem("garminAccessToken");
        if (garminToken) {
          setGarminConnected(true);
        }

        if (code) {
          if (state === "strava") {
            // Strava OAuth callback
            exchangeStravaCode(code)
              .then(async (data) => {
                localStorage.setItem("stravaAccessToken", data.access_token);
                setStravaApiConnected(true);
                setMessage({ type: "info", text: "Connected to Strava! Fetching your activities..." });
                window.history.replaceState({}, document.title, window.location.pathname);

                // Fetch recent running activities
                try {
                  const activities = await fetchStravaActivities(data.access_token, 1, 30);
                  const runs = activities.filter(a => a.type === "Run" || a.sport_type === "Run");
                  const internals = [];
                  for (const run of runs.slice(0, 15)) { // Max 15 recent runs
                    const streams = await fetchStravaActivityStream(data.access_token, run.id);
                    internals.push(stravaActivityToInternal(run, streams));
                  }

                  // Merge and deduplicate
                  const combined = stravaActivities ? [...stravaActivities, ...internals] : internals;
                  const deduped = deduplicateActivities(combined);
                  setStravaActivities(deduped);
                  const model = PerformanceLab.buildPersonalModel(deduped);
                  setPersonalModel(model);
                  setStravaConnected(true);
                  setImportSources(prev => [...new Set([...prev, "strava"])]);
                  setMessage({ type: "success", text: `${internals.length} runs imported from Strava (${deduped.length} total after dedup).` });
                } catch (err) {
                  setMessage({ type: "error", text: `Strava import error: ${err.message}` });
                }
              })
              .catch((err) => {
                setMessage({ type: "error", text: `Strava auth error: ${err.message}` });
                window.history.replaceState({}, document.title, window.location.pathname);
              });
          } else {
            // Default: Spotify OAuth callback
            exchangeCodeForToken(code)
              .then((token) => {
                setSpotifyToken(token);
                fetchSpotifyUser(token);
                window.history.replaceState({}, document.title, window.location.pathname);
              })
              .catch((err) => {
                setMessage({ type: "error", text: `Auth error: ${err.message}` });
              });
          }
        }
      }, []);

      const fetchSpotifyUser = async (token) => {
        try {
          const user = await getSpotifyUser(token);
          setSpotifyUser(user);
          fetchMyTaste(token);
        } catch (err) {
          console.error("Failed to fetch user", err);
        }
      };

      const fetchMyTaste = async (token) => {
        setLoadingTaste(true);
        try {
          const [topTracksData, topArtistsData] = await Promise.all([
            getTopTracks(token, "medium_term", 20),
            getTopArtists(token, "medium_term", 10),
          ]);

          // Build artist affinity map: artistId → average popularity from user's top tracks
          const artistAffinityMap = new Map();
          topTracksData.items.forEach((t) => {
            (t.artists || []).forEach((a) => {
              if (!artistAffinityMap.has(a.id)) artistAffinityMap.set(a.id, []);
              artistAffinityMap.get(a.id).push(t.popularity || 0);
            });
          });
          // Convert arrays to averages
          artistAffinityMap.forEach((pops, artistId) => {
            artistAffinityMap.set(artistId, pops.reduce((a, b) => a + b, 0) / pops.length);
          });

          setTopSeeds({
            trackIds: topTracksData.items.map((t) => t.id),
            trackNames: topTracksData.items.slice(0, 5).map((t) => t.name),
            artistIds: topArtistsData.items.map((a) => a.id),
            artistNames: topArtistsData.items.slice(0, 5).map((a) => a.name),
            genres: [...new Set(topArtistsData.items.flatMap((a) => a.genres))].slice(0, 10),
            topTracksFull: topTracksData.items, // Full objects for scoring
            artistAffinityMap, // artistId → avg popularity from user history
          });
        } catch (err) {
          console.warn("Could not load listening history", err);
          setTopSeeds(null);
        } finally {
          setLoadingTaste(false);
        }
      };

      const flatRunTrail = flatRunActive
        ? {
            id: "flat-run",
            name: `Flat Run ${flatRunDistance}K`,
            location: "Custom flat route",
            distance: flatRunDistance,
            elevGain: 0,
            difficulty: "Easy",
            profile: Array(20).fill(50),
          }
        : null;

      const filteredTrails = React.useMemo(() => {
        let trails = TRAIL_DATABASE;

        // Text search
        if (trailSearch.trim()) {
          const q = trailSearch.toLowerCase();
          trails = trails.filter(t =>
            t.name.toLowerCase().includes(q) ||
            t.location.toLowerCase().includes(q) ||
            t.region.toLowerCase().includes(q) ||
            (t.country || "").toLowerCase().includes(q)
          );
        }

        // Type filter
        if (trailFilter === "road") trails = trails.filter(t => t.type === "road");
        else if (trailFilter === "trail") trails = trails.filter(t => t.type === "trail");
        else if (trailFilter === "upcoming") {
          const now = new Date();
          const threeMonths = new Date(now.getTime() + 90 * 24 * 60 * 60 * 1000);
          trails = trails.filter(t => {
            if (!t.date) return false;
            const d = new Date(t.date);
            return d >= now && d <= threeMonths;
          });
        }

        return trails;
      }, [trailSearch, trailFilter]);

      const currentTrail = flatRunTrail || gpxTrail || selectedTrail;

      const trailElevProfile = currentTrail ? currentTrail.profile : [];
      const elevSegments = currentTrail ? calculateElevationGradient(trailElevProfile) : [];

      const trailDistance = currentTrail ? currentTrail.distance : 0;

      const trailElevGain = currentTrail ? currentTrail.elevGain : 0;

      // Auto-set realistic default time when trail changes
      // ~5:00/km base pace, add ~30s/km per 100m elevation gain
      useEffect(() => {
        if (trailDistance > 0) {
          const elevFactor = trailElevGain > 0 ? (trailElevGain / 100) * 0.5 : 0;
          const realisticPace = 5.0 + elevFactor / trailDistance;
          const realisticMinutes = Math.round(trailDistance * realisticPace);
          const hrs = Math.floor(realisticMinutes / 60);
          const mins = realisticMinutes % 60;
          setTargetPace(Math.round(realisticPace * 10) / 10);
          setTargetTime(realisticMinutes / 60);
          setTargetTimeHours(hrs);
          setTargetTimeMinutes(mins);
        }
      }, [currentTrail?.id, trailDistance]);

      // Compute race plan when personal model and trail are both available
      React.useEffect(() => {
        if (personalModel && currentTrail) {
          const distKm = currentTrail.distance;
          let targetSec;
          if (targetMode === "time") {
            targetSec = (targetTimeHours * 3600) + (targetTimeMinutes * 60);
          } else {
            targetSec = personalModel.basePace * distKm;
          }
          const plan = PerformanceLab.computeRacePlan(personalModel, currentTrail.profile, distKm, targetSec);
          setRacePlan(plan);
        } else {
          setRacePlan(null);
        }
      }, [personalModel, currentTrail, targetMode, targetTimeHours, targetTimeMinutes]);

      let paceMin = targetPace;
      let estimatedTime = 0;

      if (targetMode === "pace" && trailDistance) {
        estimatedTime = trailDistance * paceMin;
      } else if (targetMode === "distance-time" && trailDistance && targetTime) {
        paceMin = targetTime / trailDistance;
      } else if (targetMode === "time" && trailDistance) {
        const hours = parseInt(targetTimeHours) || 0;
        const minutes = parseInt(targetTimeMinutes) || 0;
        const totalMinutes = hours * 60 + minutes;
        paceMin = totalMinutes / trailDistance;
      }

      const baseBpm = paceToBaseBpm(paceMin);

      // ============ TRACK SCORING ALGORITHM ============
      // Scores a candidate track (0–100) using 4 signals:
      //   User Affinity (40), BPM Proximity (30), Popularity (20), Artist Variety (−10)
      function scoreTrack(track, targetBpm, seeds, usedArtistCounts) {
        // Signal 1: BPM Proximity (0–30 pts) — linear decay over ±30 BPM
        const bpmDiff = Math.abs((track.tempo || targetBpm) - targetBpm);
        const bpmScore = Math.max(0, 30 * (1 - bpmDiff / 30));

        // Signal 2: User Affinity (0–40 pts)
        let affinityScore = 0;
        if (seeds && seeds.topTracksFull) {
          const isTopTrack = seeds.topTracksFull.some((t) => t.id === track.id);
          if (isTopTrack) {
            affinityScore = 40; // Direct match — user actively listens to this track
          } else if (track.artists && track.artists.length > 0 && seeds.artistAffinityMap) {
            // Check if any of the track's artists appear in user's history
            const bestArtistAffinity = Math.max(
              0,
              ...track.artists.map((a) => seeds.artistAffinityMap.get(a.id) || 0)
            );
            if (bestArtistAffinity > 0) {
              affinityScore = 20 + (bestArtistAffinity / 100) * 20; // 20–40 scaled
            }
          }
        }

        // Signal 3: Worldwide Popularity (0–20 pts)
        const popularityScore = ((track.popularity || 0) / 100) * 20;

        // Signal 4: Artist Variety Penalty (0 to −10 pts)
        let varietyPenalty = 0;
        if (track.artists && track.artists.length > 0) {
          const primaryArtistId = track.artists[0].id;
          const count = usedArtistCounts.get(primaryArtistId) || 0;
          if (count >= 3) {
            varietyPenalty = 10; // Hard penalty — too many tracks from this artist
          } else if (count > 0) {
            varietyPenalty = 5 * count; // Soft penalty per appearance
          }
        }

        return Math.max(0, Math.min(100, bpmScore + affinityScore + popularityScore - varietyPenalty));
      }

      // ── Handle TCX file imports ──
      const handleTCXFiles = async (files) => {
        setLoading(true);
        setMessage({ type: "info", text: `Parsing ${files.length} activity file${files.length > 1 ? "s" : ""}...` });
        try {
          const allActivities = [];
          for (const file of files) {
            const text = await file.text();
            const parsed = parseTCXFile(text);
            allActivities.push(...parsed);
          }
          if (allActivities.length === 0) {
            setMessage({ type: "error", text: "No running activities found in the uploaded files. Make sure they contain GPS + HR data." });
            setLoading(false);
            return;
          }
          // If we already have activities, merge and deduplicate
          const merged = stravaActivities ? [...stravaActivities, ...allActivities] : allActivities;
          const combined = deduplicateActivities(merged);
          setStravaActivities(combined);
          const model = PerformanceLab.buildPersonalModel(combined);
          setPersonalModel(model);
          setStravaConnected(true);
          const deduped = merged.length - combined.length;
          setMessage({
            type: "success",
            text: `${allActivities.length} activit${allActivities.length > 1 ? "ies" : "y"} imported (${combined.length} total${deduped > 0 ? `, ${deduped} duplicate${deduped > 1 ? "s" : ""} removed` : ""}). Your model has been updated.`
          });
        } catch (err) {
          setMessage({ type: "error", text: `Import error: ${err.message}` });
        }
        setLoading(false);
      };

      const generatePlaylistTracks = async () => {
        if (!currentTrail) {
          setMessage({ type: "error", text: "Please select or import a trail" });
          return;
        }

        setLoading(true);
        try {
          const segments = elevSegments;
          const tracksBySegment = [];

          // ── Dedup & variety state (reset each generation) ──
          const usedTrackIds = new Set();
          const usedArtistCounts = new Map();
          const OVER_FETCH = 10; // Fetch 10 candidates per segment, pick best 1

          const totalSegments = segments.length;
          for (let segIdx = 0; segIdx < segments.length; segIdx++) {
            const seg = segments[segIdx];
            // Progressive BPM: start ~12% slower, ramp up to ~5% faster by end
            const progress = totalSegments > 1 ? segIdx / (totalSegments - 1) : 1;
            const progressionFactor = 0.88 + 0.17 * Math.pow(progress, 1.3);
            const rawBpm = gradientToBpm(seg.gradient, baseBpm);
            let bpm;
            if (racePlan && racePlan.segments[segIdx]) {
              // Use data-science driven BPM from personal model
              bpm = racePlan.segments[segIdx].targetBpm;
            } else {
              bpm = Math.round(Math.max(95, Math.min(185, rawBpm * progressionFactor)));
            }
            let selectedTrack = null;

            if (spotifyToken) {
              try {
                // ── Fetch candidates (over-fetch for dedup headroom) ──
                let rec;
                if (musicMode === "random" && topSeeds) {
                  const shuffledTracks = [...topSeeds.trackIds].sort(() => Math.random() - 0.5);
                  rec = await searchTracksByBpmPersonalized(
                    spotifyToken, bpm, OVER_FETCH,
                    shuffledTracks.slice(0, 5),
                    [], topSeeds
                  );
                } else if (musicMode === "mood" && selectedMood) {
                  rec = await searchTracksByBpm(spotifyToken, bpm, OVER_FETCH, selectedMood);
                } else if (musicMode === "my-taste" && topSeeds) {
                  const shuffledTracks = [...topSeeds.trackIds].sort(() => Math.random() - 0.5);
                  const shuffledArtists = [...topSeeds.artistIds].sort(() => Math.random() - 0.5);
                  rec = await searchTracksByBpmPersonalized(
                    spotifyToken, bpm, OVER_FETCH,
                    shuffledTracks.slice(0, 3),
                    shuffledArtists.slice(0, 2), topSeeds
                  );
                } else {
                  const genres = ["electronic", "rock", "pop", "indie"];
                  const genre = genres[Math.floor(Math.random() * genres.length)];
                  rec = await searchTracksByBpm(spotifyToken, bpm, OVER_FETCH, genre);
                }

                // ── Score, deduplicate, and select best track ──
                if (rec.tracks && rec.tracks.length > 0) {
                  const candidates = rec.tracks
                    .filter((t) => t.id && !usedTrackIds.has(t.id)) // Remove duplicates
                    .map((t) => ({
                      ...t,
                      _score: scoreTrack(t, bpm, topSeeds, usedArtistCounts),
                    }))
                    .sort((a, b) => b._score - a._score); // Best first

                  if (candidates.length > 0) {
                    const best = candidates[0];
                    usedTrackIds.add(best.id);
                    const primaryArtistId = best.artists?.[0]?.id;
                    if (primaryArtistId) {
                      usedArtistCounts.set(primaryArtistId, (usedArtistCounts.get(primaryArtistId) || 0) + 1);
                    }
                    selectedTrack = {
                      name: best.name,
                      artist: best.artists?.[0]?.name || "Unknown Artist",
                      bpm: bpm,
                      uri: best.uri,
                      popularity: best.popularity || 0,
                      score: best._score,
                    };
                  }
                }
              } catch (err) {
                console.warn("Spotify API error for segment", segIdx, err);
              }
            }

            // ── Mock fallback (also deduped) ──
            if (!selectedTrack) {
              const mockCandidate = MOCK_TRACKS
                .filter((t) => Math.abs(t.bpm - bpm) <= 20 && !usedTrackIds.has(t.uri))
                .slice(0, 1)[0];
              if (mockCandidate) {
                usedTrackIds.add(mockCandidate.uri);
                selectedTrack = { ...mockCandidate, bpm, score: 0 };
              }
            }

            tracksBySegment.push({
              bpm,
              gradient: seg.gradient,
              tracks: selectedTrack ? [selectedTrack] : [],
            });
          }

          const allTracks = tracksBySegment.flatMap((seg) => seg.tracks);
          const allTrackUris = allTracks.map((t) => t.uri);

          setGeneratedPlaylist({
            segments: tracksBySegment,
            tracks: allTracks,
            trackUris: allTrackUris,
            pace: paceMin.toFixed(1),
            time: estimatedTime.toFixed(0),
          });

          setMessage({ type: "success", text: `Playlist generated! ${uniqueCount} unique tracks matched to your trail.` });
        } catch (err) {

        } finally {
          setLoading(false);
        }

                    q: "How does PaceDrop match music to terrain?",
                    a: "Each segment of your route is analyzed for gradient. On climbs, your cadence naturally drops and effort rises — so PaceDrop selects lower-BPM, high-energy tracks. On flats and descents, it shifts to faster-tempo music that matches your stride frequency. Research on auditory-motor synchronization shows that runners naturally lock their cadence to musical tempo, improving economy by 1–3%."
                  },
                  {
                    q: "What is the 'constant effort' race strategy?",
                    a: "Instead of running even splits (same pace everywhere), PaceDrop distributes your target time proportionally to each segment's energy cost — based on the Minetti et al. (2002) metabolic cost polynomial. You slow down on steep climbs and speed up on descents, but your physiological effort stays even. This is the strategy elite ultra-runners use on mountain courses like UTMB."
                  },
                  {
                    q: "How does the personal model work?",
                    a: "When you import your training data, PaceDrop builds a linear regression model of how your pace and cadence change with gradient. It also calculates your heart rate drift across runs (a proxy for fatigue) and your base aerobic capacity. These personal coefficients replace generic assumptions — so your race plan and playlist are calibrated to how you actually run, not an average runner."
                  },
                  {
                    q: "What is the emotional arc in the playlist?",
                    a: "Sports psychology research identifies three phases in endurance performance. The first 30% is 'controlled' — music is steady, helping you settle into rhythm. The middle 40% is 'dissociative' — varied tracks help your mind drift, reducing perceived effort. The final 30% is 'motivational' — high-energy, familiar tracks push you through fatigue. PaceDrop maps this arc onto your route automatically."
                  },
                  {
                    q: "How does track scoring work?",
                    a: "Each candidate track is scored 0–100 on four signals: BPM proximity to your target cadence (30 points), affinity to your listening history (40 points — direct matches score highest, familiar artists score proportionally), Spotify popularity (20 points), and an artist variety penalty (up to −10 points to avoid repeats). The best-scoring unique track wins each segment."
                  },
                  {
                    q: "Why connect Strava or Garmin?",
                    a: "Your training history contains the data PaceDrop needs to personalize everything — your pace response to gradient, your natural cadence range, your heart rate patterns. The more runs you import, the more accurate the model. Duplicate runs from multiple sources are automatically detected and merged, so you can safely connect both."
                  },

          </div>

          {/* Trail Running Hero — Embedded SVG Mountain Scene */}
          <div className="trail-hero">
            <svg viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#1E3A5F" />
                  <stop offset="40%" stopColor="#2A1B3D" />
                  <stop offset="100%" stopColor="#0F0F13" />
                </linearGradient>
                <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#F06840" stopOpacity="1" />
                  <stop offset="100%" stopColor="#E6A817" stopOpacity="0.6" />
                </linearGradient>
                <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor="#F06840" stopOpacity="0.4" />
                  <stop offset="60%" stopColor="#E6A817" stopOpacity="0.1" />
                  <stop offset="100%" stopColor="transparent" stopOpacity="0" />
                </radialGradient>
                <linearGradient id="mtn1" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#2A2A35" />
                  <stop offset="100%" stopColor="#16161C" />
                </linearGradient>
                <linearGradient id="mtn2" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#1F1F28" />
                  <stop offset="100%" stopColor="#0F0F13" />
                </linearGradient>
                <linearGradient id="mtn3" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#18181F" />
                  <stop offset="100%" stopColor="#0A0A0E" />
                </linearGradient>
                <linearGradient id="trailLine" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stopColor="#E04E2A" stopOpacity="0" />
                  <stop offset="20%" stopColor="#E04E2A" stopOpacity="0.8" />
                  <stop offset="80%" stopColor="#E6A817" stopOpacity="0.6" />
                  <stop offset="100%" stopColor="#E6A817" stopOpacity="0" />
                </linearGradient>
              </defs>
              {/* Sky */}
              <rect width="1200" height="500" fill="url(#skyGrad)" />
              {/* Sun / Golden Hour Glow */}
              <circle cx="900" cy="160" r="120" fill="url(#sunGlow)" />
              <circle cx="900" cy="160" r="35" fill="url(#sunGrad)" opacity="0.9" />
              {/* Stars */}
              <circle cx="150" cy="60" r="1.5" fill="white" opacity="0.5" />
              <circle cx="350" cy="40" r="1" fill="white" opacity="0.4" />
              <circle cx="550" cy="80" r="1.2" fill="white" opacity="0.3" />
              <circle cx="750" cy="30" r="1" fill="white" opacity="0.4" />
              <circle cx="1050" cy="70" r="1.3" fill="white" opacity="0.35" />
              <circle cx="200" cy="110" r="0.8" fill="white" opacity="0.25" />
              <circle cx="480" cy="45" r="1.1" fill="white" opacity="0.3" />
              {/* Far mountain range (back) */}
              <path d="M0 500 L0 240 L80 210 L150 180 L220 200 L300 150 L380 170 L450 120 L520 145 L600 110 L680 135 L750 95 L830 125 L900 160 L980 130 L1060 155 L1120 140 L1200 170 L1200 500Z" fill="url(#mtn1)" opacity="0.7" />
              {/* Snow caps on far peaks */}
              <path d="M445 120 L450 120 L455 123 L450 122Z" fill="white" opacity="0.15" />
              <path d="M595 110 L600 110 L608 116 L600 114Z" fill="white" opacity="0.15" />
              <path d="M745 95 L750 95 L758 102 L750 100Z" fill="white" opacity="0.2" />
              {/* Mid mountain range */}
              <path d="M0 500 L0 300 L100 270 L200 290 L320 240 L420 260 L500 210 L580 240 L660 200 L740 230 L840 190 L920 220 L1000 250 L1080 220 L1140 240 L1200 260 L1200 500Z" fill="url(#mtn2)" opacity="0.85" />
              {/* Near mountain range (foreground) */}
              <path d="M0 500 L0 360 L80 340 L180 360 L280 320 L380 345 L460 300 L540 330 L640 290 L720 320 L820 280 L900 310 L1000 330 L1080 300 L1160 340 L1200 320 L1200 500Z" fill="url(#mtn3)" />
              {/* Trail path winding through mountains */}
              <path d="M100 380 Q200 350 300 365 Q400 380 500 340 Q600 300 700 320 Q800 340 900 310 Q1000 280 1100 300" fill="none" stroke="url(#trailLine)" strokeWidth="2.5" strokeDasharray="8 4" opacity="0.7" />
              {/* Runner silhouette on trail */}
              <g transform="translate(580, 310) scale(0.5)" opacity="0.85">
                {/* Head */}
                <circle cx="0" cy="-28" r="6" fill="#E04E2A" />
                {/* Body */}
                <line x1="0" y1="-22" x2="-2" y2="-4" stroke="#E04E2A" strokeWidth="3" strokeLinecap="round" />
                {/* Front leg (stride) */}
                <line x1="-2" y1="-4" x2="10" y2="12" stroke="#E04E2A" strokeWidth="2.5" strokeLinecap="round" />
                {/* Back leg */}
                <line x1="-2" y1="-4" x2="-14" y2="8" stroke="#E04E2A" strokeWidth="2.5" strokeLinecap="round" />
                {/* Front arm */}
                <line x1="0" y1="-18" x2="-12" y2="-8" stroke="#E04E2A" strokeWidth="2" strokeLinecap="round" />
                {/* Back arm */}
                <line x1="0" y1="-18" x2="10" y2="-10" stroke="#E04E2A" strokeWidth="2" strokeLinecap="round" />
              </g>
              {/* Atmospheric haze */}
              <rect x="0" y="350" width="1200" height="150" fill="url(#mtn3)" opacity="0.3" />
            </svg>
            <div className="trail-hero-overlay">
              <div className="trail-hero-title">Every Beat Knows The Trail</div>
              <div className="trail-hero-sub">Intelligence in the run</div>
            </div>
          </div>

          <footer>
            <p>
              PaceDrop · Built for runners who chase summits
            </p>
          </footer>
        </div>
      );
    }

    // ============ ERROR BOUNDARY ============
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error("Error caught:", error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="container" style={{ paddingTop: "40px" }}>
              <div className="message message-error">
                <strong>Something went wrong:</strong> {this.state.error?.message}
              </div>
            </div>
          );
        }

        return this.props.children;
      }
    }

    // ============ RENDER ============
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(ErrorBoundary, null, React.createElement(PaceDropApp)));
  </script>
</body>
